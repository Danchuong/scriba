<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Scriba output — Example 08: Monkey and Apple-trees</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
  onload="renderMathInElement(document.body,{delimiters:[{left:'$',right:'$',display:false}]})"></script>
<style>
  body { font-family: "Inter", system-ui, sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1.5rem 4rem; color: #0f172a; line-height: 1.6; background: #f8fafc; }
  h1 { font-size: 1.5rem; margin: 0 0 .25rem; }
  .meta { color: #64748b; font-size: .85rem; margin: 0 0 2rem; }
  kbd { font: 11px ui-monospace, monospace; border: 1px solid #cbd5e1; border-bottom-width: 2px; border-radius: 4px; padding: 1px 5px; background: #fff; }

  figure.scriba-widget {
    margin: 2rem 0;
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 1px 3px rgba(0,0,0,.05), 0 8px 24px rgba(0,0,0,.05);
  }
  figure.scriba-widget:focus-visible { outline: 2px solid #2563eb; outline-offset: 2px; }

  .scriba-widget-svg {
    background: #f8fafc;
    padding: 1.25rem 1rem;
    min-height: 460px;
  }
  .scriba-widget-svg svg { width: 100%; max-width: 820px; height: auto; display: block; margin: 0 auto; }

  /* Node states */
  .mk-node {
    opacity: 0;
    transition: opacity 380ms ease, transform 380ms ease;
  }
  .mk-node.visible { opacity: 1; }
  .mk-node rect.box {
    fill: #fff;
    stroke: #cbd5e1;
    stroke-width: 1.5;
    transition: fill 260ms, stroke 260ms;
  }
  .mk-node.walk     rect.box { fill: #fef3c7; stroke: #f59e0b; stroke-width: 2.5; }
  .mk-node.apply    rect.box { fill: #fee2e2; stroke: #dc2626; stroke-width: 2.5; }
  .mk-node.push     rect.box { fill: #fce7f3; stroke: #db2777; stroke-width: 2.5; }
  .mk-node.contained rect.box { fill: #d1fae5; stroke: #059669; stroke-width: 2.5; }
  .mk-node.skip     rect.box { fill: #f1f5f9; stroke: #94a3b8; stroke-dasharray: 3 3; }

  .mk-node .range { font: 600 11px ui-monospace, monospace; fill: #334155; text-anchor: middle; }
  .mk-node .freq  { font: 700 14px "Inter", sans-serif; fill: #0f172a; text-anchor: middle; }

  .mk-node .lazy-bg {
    fill: #ea580c;
    opacity: 0;
    transition: opacity 300ms;
  }
  .mk-node .lazy-txt {
    font: 700 10px ui-monospace, monospace;
    fill: #fff;
    text-anchor: middle;
    opacity: 0;
    transition: opacity 300ms;
  }
  .mk-node.has-lazy .lazy-bg,
  .mk-node.has-lazy .lazy-txt { opacity: 1; }

  .mk-edge {
    stroke: #cbd5e1;
    stroke-width: 1.5;
    fill: none;
    opacity: 0;
    transition: opacity 380ms;
  }
  .mk-edge.visible { opacity: 1; }

  .mk-axis { stroke: #cbd5e1; stroke-width: 1; }
  .mk-axis-tick {
    font: 500 10px ui-monospace, monospace;
    fill: #64748b;
    text-anchor: middle;
  }

  .mk-oplabel {
    font: 600 12px "Inter", sans-serif;
    fill: #2563eb;
    text-anchor: middle;
  }

  /* Controls */
  .scriba-widget-controls { display: flex; gap: .5rem; padding: .75rem 1rem; border-top: 1px solid #e2e8f0; background: #fff; align-items: center; }
  .scriba-widget-controls button { font: 500 .85rem "Inter", sans-serif; background: #fff; border: 1px solid #cbd5e1; padding: .45rem .85rem; border-radius: 7px; cursor: pointer; color: #0f172a; }
  .scriba-widget-controls button:hover:not(:disabled) { background: #f1f5f9; border-color: #64748b; }
  .scriba-widget-controls button:disabled { opacity: .35; cursor: not-allowed; }
  .scriba-widget-controls button[data-action="play"].playing { background: #2563eb; color: #fff; border-color: #2563eb; }
  .scriba-widget-counter { margin-left: auto; font: 500 .82rem ui-monospace, monospace; color: #64748b; font-variant-numeric: tabular-nums; }
  .scriba-widget-progress { display: flex; gap: 4px; padding: 0 1rem .75rem; background: #fff; }
  .scriba-widget-progress .bar { flex: 1; height: 3px; border-radius: 2px; background: #e2e8f0; transition: background 220ms; }
  .scriba-widget-progress .bar.done { background: #2563eb; }
  .scriba-widget-narration { padding: 1rem 1.25rem 1.25rem; border-top: 1px solid #e2e8f0; background: #fff; min-height: 5.5rem; }
  .scriba-widget-narration .step-title { font: 600 .72rem ui-monospace, monospace; color: #2563eb; text-transform: uppercase; letter-spacing: .05em; margin: 0 0 .4rem; }
  .scriba-widget-narration p { margin: 0; color: #0f172a; display: none; font-size: .92rem; line-height: 1.55; }
  .scriba-widget-narration p.active { display: block; }
</style>
</head>
<body>

<h1>Example 08 — Monkey and Apple-trees output</h1>
<p class="meta">9-step walkthrough. <code>range_set(2,5)</code> rồi <code>range_sum(3,6)=3</code>. Node pop-in khi allocate, lazy badge cam khi <code>lazy=1</code>. <kbd>←</kbd> <kbd>→</kbd> nav, <kbd>Space</kbd> play/pause.</p>

<figure class="scriba-widget"
        data-scriba-kind="scene"
        data-scriba-src="input.md:16"
        data-step-current="1"
        data-step-total="9"
        tabindex="0">

  <div class="scriba-widget-svg">
    <svg viewBox="0 0 820 460" role="img" aria-label="Sparse segment tree over [0,7] with lazy propagation">

      <!-- Number line at bottom -->
      <line class="mk-axis" x1="60" y1="410" x2="760" y2="410"/>
      <g class="mk-axis-tick">
        <text x="60"  y="428">0</text>
        <text x="160" y="428">1</text>
        <text x="260" y="428">2</text>
        <text x="360" y="428">3</text>
        <text x="460" y="428">4</text>
        <text x="560" y="428">5</text>
        <text x="660" y="428">6</text>
        <text x="760" y="428">7</text>
      </g>

      <!-- Op label -->
      <text id="op-label" class="mk-oplabel" x="410" y="448"></text>

      <!-- Edges -->
      <g class="mk-edges">
        <!-- root -> L, R -->
        <line id="e-0-7__0-3" class="mk-edge" x1="410" y1="76"  x2="230" y2="166"/>
        <line id="e-0-7__4-7" class="mk-edge" x1="410" y1="76"  x2="590" y2="166"/>
        <!-- L -> LL, LR -->
        <line id="e-0-3__0-1" class="mk-edge" x1="230" y1="166" x2="115" y2="256"/>
        <line id="e-0-3__2-3" class="mk-edge" x1="230" y1="166" x2="310" y2="256"/>
        <!-- R -> RL, RR -->
        <line id="e-4-7__4-5" class="mk-edge" x1="590" y1="166" x2="510" y2="256"/>
        <line id="e-4-7__6-7" class="mk-edge" x1="590" y1="166" x2="705" y2="256"/>
        <!-- LR -> [2,2], [3,3] -->
        <line id="e-2-3__2-2" class="mk-edge" x1="310" y1="256" x2="265" y2="336"/>
        <line id="e-2-3__3-3" class="mk-edge" x1="310" y1="256" x2="355" y2="336"/>
        <!-- RR -> [6,6] (only [6,6] shown; [7,7] never allocated) -->
        <line id="e-6-7__6-6" class="mk-edge" x1="705" y1="256" x2="670" y2="336"/>
      </g>

      <!-- ===== Nodes ===== -->

      <!-- Root [0,7] — level 0 -->
      <g id="n-0-7" class="mk-node visible" transform="translate(410, 50)">
        <rect class="box" x="-44" y="-26" width="88" height="52" rx="7"/>
        <text class="range" x="0" y="-6">[0,7]</text>
        <text class="freq"  x="0" y="14">0</text>
        <rect class="lazy-bg" x="24" y="-30" width="22" height="14" rx="3"/>
        <text class="lazy-txt" x="35" y="-19">L</text>
      </g>

      <!-- Level 1 -->
      <g id="n-0-3" class="mk-node" transform="translate(230, 140)">
        <rect class="box" x="-44" y="-26" width="88" height="52" rx="7"/>
        <text class="range" x="0" y="-6">[0,3]</text>
        <text class="freq"  x="0" y="14">0</text>
        <rect class="lazy-bg" x="24" y="-30" width="22" height="14" rx="3"/>
        <text class="lazy-txt" x="35" y="-19">L</text>
      </g>
      <g id="n-4-7" class="mk-node" transform="translate(590, 140)">
        <rect class="box" x="-44" y="-26" width="88" height="52" rx="7"/>
        <text class="range" x="0" y="-6">[4,7]</text>
        <text class="freq"  x="0" y="14">0</text>
        <rect class="lazy-bg" x="24" y="-30" width="22" height="14" rx="3"/>
        <text class="lazy-txt" x="35" y="-19">L</text>
      </g>

      <!-- Level 2 -->
      <g id="n-0-1" class="mk-node" transform="translate(115, 230)">
        <rect class="box" x="-38" y="-22" width="76" height="46" rx="6"/>
        <text class="range" x="0" y="-4">[0,1]</text>
        <text class="freq"  x="0" y="14">0</text>
      </g>
      <g id="n-2-3" class="mk-node" transform="translate(310, 230)">
        <rect class="box" x="-38" y="-22" width="76" height="46" rx="6"/>
        <text class="range" x="0" y="-4">[2,3]</text>
        <text class="freq"  x="0" y="14">0</text>
        <rect class="lazy-bg" x="20" y="-26" width="22" height="14" rx="3"/>
        <text class="lazy-txt" x="31" y="-15">L</text>
      </g>
      <g id="n-4-5" class="mk-node" transform="translate(510, 230)">
        <rect class="box" x="-38" y="-22" width="76" height="46" rx="6"/>
        <text class="range" x="0" y="-4">[4,5]</text>
        <text class="freq"  x="0" y="14">0</text>
        <rect class="lazy-bg" x="20" y="-26" width="22" height="14" rx="3"/>
        <text class="lazy-txt" x="31" y="-15">L</text>
      </g>
      <g id="n-6-7" class="mk-node" transform="translate(705, 230)">
        <rect class="box" x="-38" y="-22" width="76" height="46" rx="6"/>
        <text class="range" x="0" y="-4">[6,7]</text>
        <text class="freq"  x="0" y="14">0</text>
      </g>

      <!-- Level 3 (leaves that get allocated) -->
      <g id="n-2-2" class="mk-node" transform="translate(265, 310)">
        <rect class="box" x="-28" y="-20" width="56" height="40" rx="5"/>
        <text class="range" x="0" y="-4">[2,2]</text>
        <text class="freq"  x="0" y="12">0</text>
        <rect class="lazy-bg" x="14" y="-22" width="20" height="13" rx="3"/>
        <text class="lazy-txt" x="24" y="-12">L</text>
      </g>
      <g id="n-3-3" class="mk-node" transform="translate(355, 310)">
        <rect class="box" x="-28" y="-20" width="56" height="40" rx="5"/>
        <text class="range" x="0" y="-4">[3,3]</text>
        <text class="freq"  x="0" y="12">0</text>
        <rect class="lazy-bg" x="14" y="-22" width="20" height="13" rx="3"/>
        <text class="lazy-txt" x="24" y="-12">L</text>
      </g>
      <g id="n-6-6" class="mk-node" transform="translate(670, 310)">
        <rect class="box" x="-28" y="-20" width="56" height="40" rx="5"/>
        <text class="range" x="0" y="-4">[6,6]</text>
        <text class="freq"  x="0" y="12">0</text>
      </g>
    </svg>
  </div>

  <div class="scriba-widget-controls">
    <button data-action="first">⏮</button>
    <button data-action="prev">◀ Prev</button>
    <button data-action="play">▶ Play</button>
    <button data-action="next">Next ▶</button>
    <button data-action="last">⏭</button>
    <span class="scriba-widget-counter">Step <span class="cur">1</span> / 9</span>
  </div>

  <div class="scriba-widget-progress">
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
  </div>

  <div class="scriba-widget-narration">
    <p class="step-title" id="step-title">STEP 1 — INIT</p>
    <p data-step="1" class="active">Cây sparse: chỉ root $[0,7]$ được cấp phát. Tất cả 14 node còn lại chưa tồn tại (mờ). Tổng cây chín = 0.</p>
    <p data-step="2">Gọi $\texttt{range\_set}([2,5])$ từ root. $[0,7]$ <b>không nằm trọn</b> trong $[2,5]$ → phải push_down và recurse xuống 2 con.</p>
    <p data-step="3">push_down ở root tạo 2 con $L=[0,3]$ và $R=[4,7]$ (cả 2 đều rỗng, $\text{lazy}=0$). Giờ recurse vào từng con.</p>
    <p data-step="4">Ở $L=[0,3]$: $LL=[0,1]$ <b>rời</b> với $[2,5]$ → skip. $LR=[2,3]$ <b>nằm trọn</b> → <b>treo lazy=1, freq=2</b>, dừng. KHÔNG đi xuống lá.</p>
    <p data-step="5">Ở $R=[4,7]$: $RL=[4,5]$ <b>nằm trọn</b> → treo lazy=1, freq=2. $RR=[6,7]$ <b>rời</b> → skip. Cả update chỉ chạm 5 node mới.</p>
    <p data-step="6">Recompute từ dưới lên: $L.\text{freq}=2$, $R.\text{freq}=2$, $\text{root}.\text{freq}=4$. <b>Lazy vẫn còn</b> ở $[2,3]$ và $[4,5]$ — món nợ chờ push xuống.</p>
    <p data-step="7">Gọi $\texttt{range\_sum}([3,6])$ từ root. $[0,7]$ không trọn trong $[3,6]$ → recurse xuống $L$ và $R$.</p>
    <p data-step="8">Ở $L$: $[0,1]$ skip. $[2,3]$ không trọn → <b>push_down</b>: lazy=1 truyền xuống $[2,2]$ và $[3,3]$ vừa sinh ($\text{freq}=1$ mỗi node). Lazy "trả nợ".</p>
    <p data-step="9">Node đóng góp: $[3,3]=1$, $[4,5]=2$, $[6,6]=0$. <b>Tổng $=1+2+0=3$</b>. Cây cuối có 11 node thay vì full 15 — sparse!</p>
  </div>
</figure>

<script>
(function() {
  // Each step is a cumulative delta applied on top of prior steps.
  // Keys:
  //   "id:visible"   → show node or edge
  //   "id:state"     → walk/apply/push/contained/skip/""
  //   "id:freq"      → replace freq text
  //   "id:has-lazy"  → true/false (orange L badge)
  //   "op"           → operation label below tree
  const STEPS = {
    1: {
      "op": "",
    },
    2: {
      "n-0-7:state": "walk",
      "op": "range_set([2, 5])",
    },
    3: {
      "n-0-3:visible": true,
      "n-4-7:visible": true,
      "e-0-7__0-3:visible": true,
      "e-0-7__4-7:visible": true,
      "n-0-7:state": "walk",
    },
    4: {
      "n-0-1:visible": true,
      "n-2-3:visible": true,
      "e-0-3__0-1:visible": true,
      "e-0-3__2-3:visible": true,
      "n-0-3:state": "walk",
      "n-0-1:state": "skip",
      "n-2-3:state": "apply",
      "n-2-3:freq": "2",
      "n-2-3:has-lazy": true,
    },
    5: {
      "n-4-5:visible": true,
      "n-6-7:visible": true,
      "e-4-7__4-5:visible": true,
      "e-4-7__6-7:visible": true,
      "n-0-3:state": "",
      "n-0-1:state": "",
      "n-2-3:state": "",
      "n-4-7:state": "walk",
      "n-6-7:state": "skip",
      "n-4-5:state": "apply",
      "n-4-5:freq": "2",
      "n-4-5:has-lazy": true,
    },
    6: {
      "n-0-7:state": "",
      "n-4-7:state": "",
      "n-6-7:state": "",
      "n-4-5:state": "",
      "n-0-3:freq": "2",
      "n-4-7:freq": "2",
      "n-0-7:freq": "4",
      "op": "Sau range_set: total = 4 cây chín",
    },
    7: {
      "n-0-7:state": "walk",
      "op": "range_sum([3, 6])",
    },
    8: {
      "n-2-2:visible": true,
      "n-3-3:visible": true,
      "e-2-3__2-2:visible": true,
      "e-2-3__3-3:visible": true,
      "n-0-3:state": "walk",
      "n-2-3:state": "push",
      "n-2-2:freq": "1",
      "n-2-2:has-lazy": true,
      "n-3-3:freq": "1",
      "n-3-3:has-lazy": true,
    },
    9: {
      "n-6-6:visible": true,
      "e-6-7__6-6:visible": true,
      "n-0-3:state": "",
      "n-2-3:state": "",
      "n-3-3:state": "contained",
      "n-4-5:state": "contained",
      "n-6-6:state": "contained",
      "n-0-7:state": "",
      "op": "Kết quả: 1 + 2 + 0 = 3 cây chín",
    },
  };

  const TITLES = [
    "STEP 1 — INIT",
    "STEP 2 — BẮT ĐẦU range_set(2, 5)",
    "STEP 3 — TẠO CON L [0,3] VÀ R [4,7]",
    "STEP 4 — APPLY LAZY TẠI [2,3]",
    "STEP 5 — APPLY LAZY TẠI [4,5]",
    "STEP 6 — UPDATE XONG",
    "STEP 7 — BẮT ĐẦU range_sum(3, 6)",
    "STEP 8 — PUSH_DOWN TẠI [2,3]",
    "STEP 9 — TRUY VẤN XONG: KẾT QUẢ = 3",
  ];

  function resetAll(widget) {
    widget.querySelectorAll(".mk-node").forEach(n => {
      n.classList.remove("walk", "apply", "push", "contained", "skip", "has-lazy");
      if (n.id !== "n-0-7") n.classList.remove("visible");
      const f = n.querySelector(".freq"); if (f) f.textContent = "0";
    });
    widget.querySelectorAll(".mk-edge").forEach(e => e.classList.remove("visible"));
    const op = widget.querySelector("#op-label"); if (op) op.textContent = "";
  }

  function applyDelta(widget, key, value) {
    if (key === "op") {
      const op = widget.querySelector("#op-label");
      if (op) op.textContent = value;
      return;
    }
    const [id, attr] = key.split(":");
    const elem = widget.querySelector("#" + id);
    if (!elem) return;
    if (attr === "visible" && value) elem.classList.add("visible");
    else if (attr === "state") {
      elem.classList.remove("walk", "apply", "push", "contained", "skip");
      if (value) elem.classList.add(value);
    }
    else if (attr === "freq") {
      const t = elem.querySelector(".freq");
      if (t) t.textContent = value;
    }
    else if (attr === "has-lazy") {
      elem.classList.toggle("has-lazy", !!value);
    }
  }

  function initWidget(widget) {
    const total = parseInt(widget.dataset.stepTotal, 10);
    const counter = widget.querySelector(".scriba-widget-counter .cur");
    const titleEl = widget.querySelector("#step-title");
    const narrations = widget.querySelectorAll(".scriba-widget-narration p[data-step]");
    const bars = widget.querySelectorAll(".scriba-widget-progress .bar");
    const playBtn = widget.querySelector('[data-action="play"]');
    let timer = null;

    function setStep(n) {
      n = Math.max(1, Math.min(total, n));
      widget.dataset.stepCurrent = n;
      counter.textContent = n;
      titleEl.textContent = TITLES[n - 1];

      resetAll(widget);
      for (let i = 1; i <= n; i++) {
        const delta = STEPS[i] || {};
        for (const k in delta) applyDelta(widget, k, delta[k]);
      }

      narrations.forEach(p => p.classList.toggle("active", parseInt(p.dataset.step, 10) === n));
      bars.forEach((b, i) => b.classList.toggle("done", i < n));

      widget.querySelector('[data-action="first"]').disabled = n === 1;
      widget.querySelector('[data-action="prev"]').disabled = n === 1;
      widget.querySelector('[data-action="next"]').disabled = n === total;
      widget.querySelector('[data-action="last"]').disabled = n === total;
      if (n === total && timer) stopPlay();
    }
    const cur = () => parseInt(widget.dataset.stepCurrent, 10);
    function stopPlay() { if (timer) { clearInterval(timer); timer = null; } playBtn.classList.remove("playing"); playBtn.textContent = "▶ Play"; }
    function startPlay() { if (cur() === total) setStep(1); playBtn.classList.add("playing"); playBtn.textContent = "⏸ Pause"; timer = setInterval(() => { if (cur() >= total) stopPlay(); else setStep(cur() + 1); }, 2400); }

    widget.querySelector('[data-action="first"]').addEventListener("click", () => { stopPlay(); setStep(1); });
    widget.querySelector('[data-action="prev"]').addEventListener("click",  () => { stopPlay(); setStep(cur() - 1); });
    widget.querySelector('[data-action="next"]').addEventListener("click",  () => { stopPlay(); setStep(cur() + 1); });
    widget.querySelector('[data-action="last"]').addEventListener("click",  () => { stopPlay(); setStep(total); });
    playBtn.addEventListener("click", () => timer ? stopPlay() : startPlay());
    widget.addEventListener("keydown", e => {
      if (e.key === "ArrowLeft")  { stopPlay(); setStep(cur() - 1); e.preventDefault(); }
      if (e.key === "ArrowRight") { stopPlay(); setStep(cur() + 1); e.preventDefault(); }
      if (e.key === "Home")       { stopPlay(); setStep(1); e.preventDefault(); }
      if (e.key === "End")        { stopPlay(); setStep(total); e.preventDefault(); }
      if (e.key === " ")          { timer ? stopPlay() : startPlay(); e.preventDefault(); }
    });

    setStep(1);
  }

  document.querySelectorAll(".scriba-widget").forEach(initWidget);
})();
</script>
