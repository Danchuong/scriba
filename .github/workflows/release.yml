# TEMPLATE — enable when PyPI trusted publisher is configured.
#
# This workflow is intentionally a template. It will NOT publish anything
# until the `uv publish` step is uncommented and a PyPI trusted-publisher
# configuration (or `PYPI_TOKEN` secret) is in place.
#
# Current status (Scriba v0.5.x, pre-1.0):
#   - No first public release on PyPI yet.
#   - Homebrew formula in `homebrew/Formula/scriba.rb` is a stub.
#   - Tag pushes and manual runs will build wheels + sdists as a dry run
#     and create a draft GitHub release from tag metadata, but will NOT
#     upload to PyPI.
#
# To enable real publishing:
#   1. Configure a PyPI trusted publisher for this repo/workflow:
#      https://docs.pypi.org/trusted-publishers/
#      (or set a repository secret `PYPI_TOKEN` and use uv publish --token).
#   2. Uncomment the `uv publish` step below.
#   3. Flip the GitHub release from draft to published once the PyPI
#      upload succeeds.
#   4. Populate real SHA-256 values in homebrew/Formula/scriba.rb.

name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write  # needed to create a GitHub release from the tag
  # id-token: write  # TODO: enable when PyPI trusted publisher is configured

jobs:
  build:
    name: build wheel + sdist
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync dev deps (for build tooling)
        run: uv sync --dev

      - name: Build wheel + sdist
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          if-no-files-found: error
          retention-days: 14

      # --------------------------------------------------------------
      # TODO: enable when trusted publisher is configured.
      # - name: Publish to PyPI
      #   env:
      #     UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
      #   run: uv publish
      # --------------------------------------------------------------

  github-release:
    name: draft github release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Create draft GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: dist/*
