<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  max-width: 720px;
  margin: 2rem auto;
  padding: 0 1rem;
  background: #fafafa;
  color: #212529;
}
h1 { font-size: 1.4rem; margin-bottom: 1.5rem; font-weight: 600; }

/* Widget container */
.scriba-widget {
  border: 1px solid #d0d7de;
  border-radius: 10px;
  background: #ffffff;
  overflow: hidden;
}

/* Controls bar */
.scriba-controls {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.6rem 1rem;
  background: #f6f8fa;
  border-bottom: 1px solid #d0d7de;
  user-select: none;
}
.scriba-controls button {
  background: #ffffff;
  border: 1px solid #d0d7de;
  border-radius: 6px;
  padding: 0.3rem 0.7rem;
  font-size: 0.8rem;
  cursor: pointer;
  color: #212529;
  transition: background 0.15s, border-color 0.15s;
}
.scriba-controls button:hover { background: #f0f0f0; border-color: #bbb; }
.scriba-controls button:active { background: #e4e4e4; }
.scriba-controls button:disabled { opacity: 0.35; cursor: default; }
.scriba-step-counter {
  font: 600 0.78rem ui-monospace, "SF Mono", monospace;
  color: #6c757d;
  min-width: 5rem;
  text-align: center;
}

/* Progress dots */
.scriba-progress {
  display: flex;
  gap: 4px;
  margin-left: auto;
}
.scriba-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #d0d7de;
  transition: background 0.2s;
}
.scriba-dot.active { background: #0072B2; }
.scriba-dot.done { background: #009E73; }

/* Stage */
.scriba-stage {
  padding: 1.25rem 1rem;
  display: flex;
  justify-content: center;
  min-height: 100px;
}
.scriba-stage-svg { width: 100%; height: auto; }

/* Narration */
.scriba-narration {
  padding: 0.75rem 1rem;
  font-size: 0.92rem;
  line-height: 1.55;
  color: #212529;
  border-top: 1px solid #f0f0f0;
  min-height: 2.5rem;
}

/* SVG text */
svg text {
  font: 700 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  text-anchor: middle;
  dominant-baseline: central;
}
.idx {
  font: 500 10px ui-monospace, monospace;
  fill: #6c757d;
}

/* Frame transition */
.scriba-stage svg, .scriba-narration {
  transition: opacity 0.2s ease;
}

/* Static filmstrip layout (legacy) */
.scriba-animation { max-width: 100%; }
.scriba-frames {
  list-style: none;
  display: flex;
  gap: 1.5rem;
  overflow-x: auto;
  padding: 1rem 0;
  scroll-snap-type: x mandatory;
}
.scriba-frame {
  flex: 0 0 auto;
  min-width: 280px;
  max-width: 560px;
  border: 1px solid #d0d7de;
  border-radius: 8px;
  background: #ffffff;
  scroll-snap-align: start;
  overflow: hidden;
}
.scriba-frame-header {
  padding: 0.5rem 1rem;
  background: #f6f8fa;
  border-bottom: 1px solid #d0d7de;
}
.scriba-step-label {
  font: 600 0.72rem ui-monospace, monospace;
  color: #6c757d;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

/* Theme toggle */
.theme-toggle {
  position: fixed; top: 1rem; right: 1rem;
  padding: 0.35rem 0.7rem; cursor: pointer;
  border: 1px solid #ccc; border-radius: 6px; background: white;
  font-size: 0.8rem;
}

/* Dark mode */
[data-theme="dark"] body { background: #0d1117; color: #e6edf3; }
[data-theme="dark"] .scriba-widget { background: #161b22; border-color: #30363d; }
[data-theme="dark"] .scriba-controls { background: #1c2128; border-color: #30363d; }
[data-theme="dark"] .scriba-controls button { background: #21262d; border-color: #30363d; color: #e6edf3; }
[data-theme="dark"] .scriba-controls button:hover { background: #30363d; }
[data-theme="dark"] .scriba-step-counter { color: #7d8590; }
[data-theme="dark"] .scriba-narration { color: #e6edf3; border-color: #21262d; }
[data-theme="dark"] .scriba-dot { background: #30363d; }
[data-theme="dark"] .idx { fill: #7d8590; }
[data-theme="dark"] .scriba-frame { background: #161b22; border-color: #30363d; }
[data-theme="dark"] .scriba-frame-header { background: #1c2128; border-color: #30363d; }
[data-theme="dark"] .scriba-step-label { color: #7d8590; }
[data-theme="dark"] .theme-toggle { background: #21262d; color: #e6edf3; border-color: #30363d; }
</style>

  ];
  var cur=0;
  var stage=W.querySelector('.scriba-stage');
  var narr=W.querySelector('.scriba-narration');
  var subC=W.querySelector('.scriba-substory-container');
  var ctr=W.querySelector('.scriba-step-counter');
  var prev=W.querySelector('.scriba-btn-prev');
  var next=W.querySelector('.scriba-btn-next');
  var dots=W.querySelectorAll('.scriba-dot');
  function initSub(el){
    var fd=JSON.parse(el.getAttribute('data-scriba-frames'));
    var sc=0,ss=el.querySelector('.scriba-stage'),sn=el.querySelector('.scriba-narration');
    var sp=el.querySelector('.scriba-btn-prev'),sx=el.querySelector('.scriba-btn-next');
    var sr=el.querySelector('.scriba-step-counter'),sd=el.querySelectorAll('.scriba-dot');
    function sh(i){sc=i;ss.innerHTML=fd[i].svg;sn.innerHTML=fd[i].narration;
      sr.textContent='Sub-step '+(i+1)+' / '+fd.length;
      sp.disabled=i===0;sx.disabled=i===fd.length-1;
      sd.forEach(function(d,j){d.className='scriba-dot'+(j===i?' active':j<i?' done':'');});
    }
    sp.addEventListener('click',function(){if(sc>0)sh(sc-1);});
    sx.addEventListener('click',function(){if(sc<fd.length-1)sh(sc+1);});
    sh(0);
  }
  function show(i){
    cur=i;
    stage.innerHTML=frames[i].svg;
    narr.innerHTML=frames[i].narration;
    subC.innerHTML=frames[i].substory||'';
    subC.querySelectorAll('.scriba-substory-widget[data-scriba-frames]').forEach(initSub);
    ctr.textContent='Step '+(i+1)+' / '+frames.length;
    prev.disabled=i===0;
    next.disabled=i===frames.length-1;
    dots.forEach(function(d,j){d.className='scriba-dot'+(j===i?' active':j<i?' done':'');});
  }
  prev.addEventListener('click',function(){if(cur>0)show(cur-1);});
  next.addEventListener('click',function(){if(cur<frames.length-1)show(cur+1);});
  W.addEventListener('keydown',function(e){
    if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();if(cur<frames.length-1)show(cur+1);}
    if(e.key==='ArrowLeft'){e.preventDefault();if(cur>0)show(cur-1);}
  });
  W.setAttribute('tabindex','0');
  show(0);
})();
