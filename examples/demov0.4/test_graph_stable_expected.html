<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scriba — test_graph_stable</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  max-width: 720px;
  margin: 2rem auto;
  padding: 0 1rem;
  background: #0d1117;
  color: #e6edf3;
}
h1 { font-size: 1.4rem; margin-bottom: 1.5rem; font-weight: 600; }

/* Widget container */
.scriba-widget {
  border: 1px solid #30363d;
  border-radius: 10px;
  background: #161b22;
  overflow: hidden;
}

/* Controls bar */
.scriba-controls {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.6rem 1rem;
  background: #1c2128;
  border-bottom: 1px solid #30363d;
  user-select: none;
}
.scriba-controls button {
  background: #21262d;
  border: 1px solid #30363d;
  border-radius: 6px;
  padding: 0.3rem 0.7rem;
  font-size: 0.8rem;
  cursor: pointer;
  color: #e6edf3;
  transition: background 0.15s, border-color 0.15s;
}
.scriba-controls button:hover { background: #30363d; border-color: #484f58; }
.scriba-controls button:active { background: #3d444d; }
.scriba-controls button:disabled { opacity: 0.35; cursor: default; }
.scriba-step-counter {
  font: 600 0.78rem ui-monospace, "SF Mono", monospace;
  color: #7d8590;
  min-width: 5rem;
  text-align: center;
}

/* Progress dots */
.scriba-progress {
  display: flex;
  gap: 4px;
  margin-left: auto;
}
.scriba-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #30363d;
  transition: background 0.2s;
}
.scriba-dot.active { background: #0072B2; }
.scriba-dot.done { background: #009E73; }

/* Stage */
.scriba-stage {
  padding: 1.25rem 1rem;
  display: flex;
  justify-content: center;
  min-height: 100px;
}
.scriba-stage-svg { width: 100%; height: auto; }

/* Narration */
.scriba-narration {
  padding: 0.75rem 1rem;
  font-size: 0.92rem;
  line-height: 1.55;
  color: #e6edf3;
  border-top: 1px solid #21262d;
  min-height: 2.5rem;
}

/* SVG text */
svg text {
  font: 700 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  text-anchor: middle;
  dominant-baseline: central;
}

/* Frame transition */
.scriba-stage svg, .scriba-narration {
  transition: opacity 0.2s ease;
}

/* Theme toggle */
.theme-toggle {
  position: fixed; top: 1rem; right: 1rem;
  padding: 0.35rem 0.7rem; cursor: pointer;
  border: 1px solid #30363d; border-radius: 6px; background: #21262d;
  font-size: 0.8rem; color: #e6edf3;
}

/* Light mode overrides */
[data-theme="light"] body { background: #fafafa; color: #212529; }
[data-theme="light"] .scriba-widget { background: #ffffff; border-color: #d0d7de; }
[data-theme="light"] .scriba-controls { background: #f6f8fa; border-color: #d0d7de; }
[data-theme="light"] .scriba-controls button { background: #ffffff; border-color: #d0d7de; color: #212529; }
[data-theme="light"] .scriba-controls button:hover { background: #f0f0f0; border-color: #bbb; }
[data-theme="light"] .scriba-step-counter { color: #6c757d; }
[data-theme="light"] .scriba-narration { color: #212529; border-color: #f0f0f0; }
[data-theme="light"] .scriba-dot { background: #d0d7de; }
[data-theme="light"] .theme-toggle { background: white; color: #212529; border-color: #ccc; }
</style>
</head>
<body>
<button class="theme-toggle" onclick="
  var t = document.documentElement.dataset.theme;
  document.documentElement.dataset.theme = t === 'dark' ? 'light' : 'dark';
">Toggle theme</button>
<h1>test_graph_stable</h1>
<div class="scriba-widget" id="test-stable">
  <div class="scriba-controls">
    <button class="scriba-btn-prev" disabled>Prev</button>
    <span class="scriba-step-counter">B&#432;&#7899;c 1 / 3</span>
    <button class="scriba-btn-next">Next</button>
    <div class="scriba-progress">
      <div class="scriba-dot active"></div>
      <div class="scriba-dot"></div>
      <div class="scriba-dot"></div>
    </div>
  </div>
  <div class="scriba-stage"></div>
  <p class="scriba-narration"></p>
</div>
<script>
(function(){
  /* ------------------------------------------------------------------ */
  /*  Node positions — FIXED across all steps (layout="stable" contract) */
  /*  Diamond layout:  a=top, b=left, c=right, d=bottom                 */
  /*  cx/cy values are IDENTICAL in every frame SVG below.               */
  /*                                                                     */
  /*    a: cx=200 cy=40                                                  */
  /*    b: cx=60  cy=160                                                 */
  /*    c: cx=340 cy=160                                                 */
  /*    d: cx=200 cy=280                                                 */
  /* ------------------------------------------------------------------ */

  /* Wong CVD-safe palette references:
     idle edge:      #7d8590 (muted gray)
     highlight edge: #E69F00 (Wong orange/gold), dashed
     done edge:      #009E73 (Wong bluish green)
     idle node fill: #21262d (dark surface)
     idle node stroke:#484f58
     done node fill: #009E73
     done node stroke:#007a59
     node text idle: #e6edf3
     node text done: #ffffff
  */

  var W=document.getElementById('test-stable');

  /* ---------- STEP 1: edge a->b highlighted, others idle ---------- */
  var svg1=`<svg class="scriba-stage-svg" data-layout="stable" viewBox="0 0 420 340" role="img" aria-label="B\u01b0\u1edbc 1: \u0110\u01b0\u1eddng \u0111i a\u2192b \u0111\u01b0\u1ee3c n\u1ed5i b\u1eadt" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow-idle" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#7d8590"/></marker>
  <marker id="arrow-highlight" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#E69F00"/></marker>
  <marker id="arrow-done" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#009E73"/></marker>
</defs>
<g transform="translate(10,10)">
<g data-primitive="graph" data-shape="g">
  <!-- edges -->
  <g class="scriba-graph-edges">
    <!-- a->b  HIGHLIGHTED: gold dashed overlay -->
    <g data-target="g.edge[(a,b)]" class="scriba-state-highlight">
      <line x1="200" y1="60"  x2="80"  y2="142" stroke="#7d8590" stroke-width="1.5" marker-end="url(#arrow-idle)"/>
      <line x1="200" y1="60"  x2="80"  y2="142" stroke="#E69F00" stroke-width="3" stroke-dasharray="6 4" marker-end="url(#arrow-highlight)"/>
    </g>
    <!-- b->c  idle -->
    <g data-target="g.edge[(b,c)]" class="scriba-state-idle">
      <line x1="80"  y1="160" x2="320" y2="160" stroke="#7d8590" stroke-width="1.5" marker-end="url(#arrow-idle)"/>
    </g>
    <!-- c->d  idle -->
    <g data-target="g.edge[(c,d)]" class="scriba-state-idle">
      <line x1="320" y1="178" x2="220" y2="262" stroke="#7d8590" stroke-width="1.5" marker-end="url(#arrow-idle)"/>
    </g>
  </g>
  <!-- nodes — cx,cy FIXED -->
  <g class="scriba-graph-nodes">
    <g data-target="g.node[a]" class="scriba-state-idle">
      <circle cx="200" cy="40" r="20" fill="#21262d" stroke="#484f58" stroke-width="1.5"/>
      <text x="200" y="40" fill="#e6edf3">a</text>
    </g>
    <g data-target="g.node[b]" class="scriba-state-idle">
      <circle cx="60" cy="160" r="20" fill="#21262d" stroke="#484f58" stroke-width="1.5"/>
      <text x="60" y="160" fill="#e6edf3">b</text>
    </g>
    <g data-target="g.node[c]" class="scriba-state-idle">
      <circle cx="340" cy="160" r="20" fill="#21262d" stroke="#484f58" stroke-width="1.5"/>
      <text x="340" y="160" fill="#e6edf3">c</text>
    </g>
    <g data-target="g.node[d]" class="scriba-state-idle">
      <circle cx="200" cy="280" r="20" fill="#21262d" stroke="#484f58" stroke-width="1.5"/>
      <text x="200" y="280" fill="#e6edf3">d</text>
    </g>
  </g>
</g>
</g>
</svg>`;

  /* ---------- STEP 2: a->b done (green), b->c highlighted ---------- */
  var svg2=`<svg class="scriba-stage-svg" data-layout="stable" viewBox="0 0 420 340" role="img" aria-label="B\u01b0\u1edbc 2: Chuy\u1ec3n sang c\u1ea1nh b\u2192c" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow-idle" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#7d8590"/></marker>
  <marker id="arrow-highlight" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#E69F00"/></marker>
  <marker id="arrow-done" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#009E73"/></marker>
</defs>
<g transform="translate(10,10)">
<g data-primitive="graph" data-shape="g">
  <!-- edges -->
  <g class="scriba-graph-edges">
    <!-- a->b  DONE: green -->
    <g data-target="g.edge[(a,b)]" class="scriba-state-done">
      <line x1="200" y1="60"  x2="80"  y2="142" stroke="#009E73" stroke-width="2" marker-end="url(#arrow-done)"/>
    </g>
    <!-- b->c  HIGHLIGHTED: gold dashed overlay -->
    <g data-target="g.edge[(b,c)]" class="scriba-state-highlight">
      <line x1="80"  y1="160" x2="320" y2="160" stroke="#7d8590" stroke-width="1.5" marker-end="url(#arrow-idle)"/>
      <line x1="80"  y1="160" x2="320" y2="160" stroke="#E69F00" stroke-width="3" stroke-dasharray="6 4" marker-end="url(#arrow-highlight)"/>
    </g>
    <!-- c->d  idle -->
    <g data-target="g.edge[(c,d)]" class="scriba-state-idle">
      <line x1="320" y1="178" x2="220" y2="262" stroke="#7d8590" stroke-width="1.5" marker-end="url(#arrow-idle)"/>
    </g>
  </g>
  <!-- nodes — cx,cy FIXED -->
  <g class="scriba-graph-nodes">
    <g data-target="g.node[a]" class="scriba-state-idle">
      <circle cx="200" cy="40" r="20" fill="#21262d" stroke="#484f58" stroke-width="1.5"/>
      <text x="200" y="40" fill="#e6edf3">a</text>
    </g>
    <g data-target="g.node[b]" class="scriba-state-idle">
      <circle cx="60" cy="160" r="20" fill="#21262d" stroke="#484f58" stroke-width="1.5"/>
      <text x="60" y="160" fill="#e6edf3">b</text>
    </g>
    <g data-target="g.node[c]" class="scriba-state-idle">
      <circle cx="340" cy="160" r="20" fill="#21262d" stroke="#484f58" stroke-width="1.5"/>
      <text x="340" y="160" fill="#e6edf3">c</text>
    </g>
    <g data-target="g.node[d]" class="scriba-state-idle">
      <circle cx="200" cy="280" r="20" fill="#21262d" stroke="#484f58" stroke-width="1.5"/>
      <text x="200" y="280" fill="#e6edf3">d</text>
    </g>
  </g>
</g>
</g>
</svg>`;

  /* ---------- STEP 3: all edges + nodes done (green) ---------- */
  var svg3=`<svg class="scriba-stage-svg" data-layout="stable" viewBox="0 0 420 340" role="img" aria-label="B\u01b0\u1edbc 3: T\u1ea5t c\u1ea3 ho\u00e0n th\u00e0nh" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow-done" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#009E73"/></marker>
</defs>
<g transform="translate(10,10)">
<g data-primitive="graph" data-shape="g">
  <!-- edges — ALL done -->
  <g class="scriba-graph-edges">
    <g data-target="g.edge[(a,b)]" class="scriba-state-done">
      <line x1="200" y1="60"  x2="80"  y2="142" stroke="#009E73" stroke-width="2" marker-end="url(#arrow-done)"/>
    </g>
    <g data-target="g.edge[(b,c)]" class="scriba-state-done">
      <line x1="80"  y1="160" x2="320" y2="160" stroke="#009E73" stroke-width="2" marker-end="url(#arrow-done)"/>
    </g>
    <g data-target="g.edge[(c,d)]" class="scriba-state-done">
      <line x1="320" y1="178" x2="220" y2="262" stroke="#009E73" stroke-width="2" marker-end="url(#arrow-done)"/>
    </g>
  </g>
  <!-- nodes — cx,cy FIXED, all done -->
  <g class="scriba-graph-nodes">
    <g data-target="g.node[a]" class="scriba-state-done">
      <circle cx="200" cy="40" r="20" fill="#009E73" stroke="#007a59" stroke-width="2"/>
      <text x="200" y="40" fill="#ffffff">a</text>
    </g>
    <g data-target="g.node[b]" class="scriba-state-done">
      <circle cx="60" cy="160" r="20" fill="#009E73" stroke="#007a59" stroke-width="2"/>
      <text x="60" y="160" fill="#ffffff">b</text>
    </g>
    <g data-target="g.node[c]" class="scriba-state-done">
      <circle cx="340" cy="160" r="20" fill="#009E73" stroke="#007a59" stroke-width="2"/>
      <text x="340" y="160" fill="#ffffff">c</text>
    </g>
    <g data-target="g.node[d]" class="scriba-state-done">
      <circle cx="200" cy="280" r="20" fill="#009E73" stroke="#007a59" stroke-width="2"/>
      <text x="200" y="280" fill="#ffffff">d</text>
    </g>
  </g>
</g>
</g>
</svg>`;

  var frames=[
    {svg:svg1, narration:"\u0110\u01b0\u1eddng \u0111i a\u2192b \u0111\u01b0\u1ee3c n\u1ed5i b\u1eadt."},
    {svg:svg2, narration:"Chuy\u1ec3n sang c\u1ea1nh b\u2192c."},
    {svg:svg3, narration:"T\u1ea5t c\u1ea3 c\u00e1c c\u1ea1nh \u0111\u00e3 ho\u00e0n th\u00e0nh. C\u00e1c node gi\u1eef nguy\u00ean v\u1ecb tr\u00ed."}
  ];

  var cur=0;
  var stage=W.querySelector('.scriba-stage');
  var narr=W.querySelector('.scriba-narration');
  var ctr=W.querySelector('.scriba-step-counter');
  var prev=W.querySelector('.scriba-btn-prev');
  var next=W.querySelector('.scriba-btn-next');
  var dots=W.querySelectorAll('.scriba-dot');
  function show(i){
    cur=i;
    stage.innerHTML=frames[i].svg;
    narr.textContent=frames[i].narration;
    ctr.textContent='B\u01b0\u1edbc '+(i+1)+' / '+frames.length;
    prev.disabled=i===0;
    next.disabled=i===frames.length-1;
    dots.forEach(function(d,j){d.className='scriba-dot'+(j===i?' active':j<i?' done':'');});
  }
  prev.addEventListener('click',function(){if(cur>0)show(cur-1);});
  next.addEventListener('click',function(){if(cur<frames.length-1)show(cur+1);});
  W.addEventListener('keydown',function(e){
    if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();if(cur<frames.length-1)show(cur+1);}
    if(e.key==='ArrowLeft'){e.preventDefault();if(cur>0)show(cur-1);}
  });
  W.setAttribute('tabindex','0');
  show(0);
})();
</script>
</body>
</html>
