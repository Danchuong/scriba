<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scriba — test_metricplot</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  max-width: 720px;
  margin: 2rem auto;
  padding: 0 1rem;
  background: #0d1117;
  color: #e6edf3;
}
h1 { font-size: 1.4rem; margin-bottom: 1.5rem; font-weight: 600; }

/* Widget container */
.scriba-widget {
  border: 1px solid #30363d;
  border-radius: 10px;
  background: #161b22;
  overflow: hidden;
}

/* Controls bar */
.scriba-controls {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.6rem 1rem;
  background: #1c2128;
  border-bottom: 1px solid #30363d;
  user-select: none;
}
.scriba-controls button {
  background: #21262d;
  border: 1px solid #30363d;
  border-radius: 6px;
  padding: 0.3rem 0.7rem;
  font-size: 0.8rem;
  cursor: pointer;
  color: #e6edf3;
  transition: background 0.15s, border-color 0.15s;
}
.scriba-controls button:hover { background: #30363d; border-color: #484f58; }
.scriba-controls button:active { background: #3b424a; }
.scriba-controls button:disabled { opacity: 0.35; cursor: default; }
.scriba-step-counter {
  font: 600 0.78rem ui-monospace, "SF Mono", monospace;
  color: #7d8590;
  min-width: 5rem;
  text-align: center;
}

/* Progress dots */
.scriba-progress {
  display: flex;
  gap: 4px;
  margin-left: auto;
}
.scriba-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #30363d;
  transition: background 0.2s;
}
.scriba-dot.active { background: #0072B2; }
.scriba-dot.done { background: #009E73; }

/* Stage */
.scriba-stage {
  padding: 1.25rem 1rem;
  display: flex;
  justify-content: center;
  min-height: 100px;
}
.scriba-stage-svg { width: 100%; height: auto; }

/* Narration */
.scriba-narration {
  padding: 0.75rem 1rem;
  font-size: 0.92rem;
  line-height: 1.55;
  color: #e6edf3;
  border-top: 1px solid #21262d;
  min-height: 2.5rem;
}

/* SVG defaults for dark theme */
svg text {
  fill: #e6edf3;
}
.scriba-metricplot-gridline-h,
.scriba-metricplot-gridline-v {
  stroke: #30363d;
  stroke-width: 0.5;
}
.scriba-metricplot-legend-label {
  fill: #e6edf3;
}

/* Theme toggle */
.theme-toggle {
  position: fixed; top: 1rem; right: 1rem;
  padding: 0.35rem 0.7rem; cursor: pointer;
  border: 1px solid #30363d; border-radius: 6px; background: #21262d;
  font-size: 0.8rem; color: #e6edf3;
}

/* Light mode overrides */
[data-theme="light"] body { background: #fafafa; color: #212529; }
[data-theme="light"] .scriba-widget { background: #ffffff; border-color: #d0d7de; }
[data-theme="light"] .scriba-controls { background: #f6f8fa; border-color: #d0d7de; }
[data-theme="light"] .scriba-controls button { background: #ffffff; border-color: #d0d7de; color: #212529; }
[data-theme="light"] .scriba-controls button:hover { background: #f0f0f0; border-color: #bbb; }
[data-theme="light"] .scriba-step-counter { color: #6c757d; }
[data-theme="light"] .scriba-narration { color: #212529; border-color: #f0f0f0; }
[data-theme="light"] .scriba-dot { background: #d0d7de; }
[data-theme="light"] svg text { fill: #24292f; }
[data-theme="light"] .scriba-metricplot-gridline-h,
[data-theme="light"] .scriba-metricplot-gridline-v { stroke: #d0d7de; }
[data-theme="light"] .scriba-metricplot-legend-label { fill: #24292f; }
[data-theme="light"] .theme-toggle { background: white; color: #212529; border-color: #ccc; }
</style>
</head>
<body>
<button class="theme-toggle" onclick="
  var t = document.documentElement.dataset.theme;
  document.documentElement.dataset.theme = t === 'dark' ? 'light' : 'dark';
">Toggle theme</button>
<h1>test_metricplot</h1>
<div class="scriba-widget" id="test-metricplot">
  <div class="scriba-controls">
    <button class="scriba-btn-prev" disabled>Prev</button>
    <span class="scriba-step-counter">Step 1 / 3</span>
    <button class="scriba-btn-next">Next</button>
    <div class="scriba-progress">
      <div class="scriba-dot active"></div>
      <div class="scriba-dot"></div>
      <div class="scriba-dot"></div>
    </div>
  </div>
  <div class="scriba-stage"></div>
  <p class="scriba-narration"></p>
</div>
<script>
(function(){
  /* ---- colour constants ---- */
  var BLUE  = '#0072B2';   /* Wong blue  – cost (solid)  */
  var RED   = '#D55E00';   /* Wong vermillion – temp (dashed 6 3) */
  var FG    = 'var(--scriba-fg, #e6edf3)';
  var GRID  = 'var(--scriba-grid, #30363d)';

  /* ---- layout constants ---- */
  var PX = 48, PY = 16, PW = 256, PH = 144;   /* plot area: x0=48, y0=16, w=256, h=144, y1=160 */
  var SVG_W = 320, SVG_H = 200;
  var OUTER_W = 352, OUTER_H = 232;

  /* ---- data per step ---- */
  var DATA = [
    { cost: [10],       temp: [100]        },
    { cost: [10, 8],    temp: [100, 90]    },
    { cost: [10, 8, 5], temp: [100, 90, 70]}
  ];

  /* ---- helpers ---- */
  function yRange(vals) {
    var mn = Math.min.apply(null, vals);
    var mx = Math.max.apply(null, vals);
    if (mn === mx) { mn -= 1; mx += 1; }          /* degenerate */
    var pad = (mx - mn) * 0.10;
    return [mn - pad, mx + pad];
  }

  function mapY(v, lo, hi) {
    return PY + PH - (v - lo) / (hi - lo) * PH;   /* y increases downward */
  }

  function mapX(i, n) {
    if (n <= 1) return PX;                          /* single point */
    return PX + i / (n - 1) * PW;
  }

  function niceStep(range) {
    var rough = range / 5;
    var pow = Math.pow(10, Math.floor(Math.log10(rough)));
    var norm = rough / pow;
    if (norm < 1.5) return pow;
    if (norm < 3.5) return 2 * pow;
    if (norm < 7.5) return 5 * pow;
    return 10 * pow;
  }

  /* ---- build one frame SVG ---- */
  function buildSVG(step) {
    var d = DATA[step];
    var allVals = d.cost.concat(d.temp);
    var r = yRange(allVals);
    var yLo = r[0], yHi = r[1];
    var n = d.cost.length;

    var s = '';

    /* --- grid --- */
    s += '<g class="scriba-metricplot-grid">';
    var yStep = niceStep(yHi - yLo);
    var yStart = Math.ceil(yLo / yStep) * yStep;
    for (var yv = yStart; yv <= yHi; yv += yStep) {
      var gy = mapY(yv, yLo, yHi).toFixed(2);
      s += '<line class="scriba-metricplot-gridline-h" x1="'+PX+'" y1="'+gy+'" x2="'+(PX+PW)+'" y2="'+gy+'"/>';
    }
    if (n > 1) {
      for (var gi = 0; gi < n; gi++) {
        var gx = mapX(gi, n).toFixed(1);
        s += '<line class="scriba-metricplot-gridline-v" x1="'+gx+'" y1="'+PY+'" x2="'+gx+'" y2="'+(PY+PH)+'"/>';
      }
    } else {
      var gx0 = mapX(0, 1).toFixed(1);
      s += '<line class="scriba-metricplot-gridline-v" x1="'+gx0+'" y1="'+PY+'" x2="'+gx0+'" y2="'+(PY+PH)+'"/>';
    }
    s += '</g>';

    /* --- axes --- */
    s += '<g class="scriba-metricplot-axes">';
    s += '<line x1="'+PX+'" y1="'+(PY+PH)+'" x2="'+(PX+PW)+'" y2="'+(PY+PH)+'" stroke="'+FG+'" stroke-width="1.5"/>';
    s += '<line x1="'+PX+'" y1="'+PY+'" x2="'+PX+'" y2="'+(PY+PH)+'" stroke="'+FG+'" stroke-width="1.5"/>';

    /* x ticks */
    s += '<g class="scriba-metricplot-xticks">';
    for (var xi = 0; xi < n; xi++) {
      var tx = mapX(xi, n).toFixed(1);
      s += '<line x1="'+tx+'" y1="'+(PY+PH)+'" x2="'+tx+'" y2="'+(PY+PH+4)+'" stroke="'+FG+'" stroke-width="1"/>';
      s += '<text x="'+tx+'" y="'+(PY+PH+14)+'" text-anchor="middle" font-size="10">'+(xi+1)+'</text>';
    }
    s += '</g>';

    /* y ticks */
    s += '<g class="scriba-metricplot-yticks">';
    for (var yv2 = yStart; yv2 <= yHi; yv2 += yStep) {
      var ty = mapY(yv2, yLo, yHi).toFixed(2);
      s += '<line x1="'+(PX-4)+'" y1="'+ty+'" x2="'+PX+'" y2="'+ty+'" stroke="'+FG+'" stroke-width="1"/>';
      s += '<text x="'+(PX-8)+'" y="'+(parseFloat(ty)+4).toFixed(2)+'" text-anchor="end" font-size="10">'+Math.round(yv2)+'</text>';
    }
    s += '</g>';

    /* axis labels */
    var xMid = (PX + PX + PW) / 2;
    var yMid = (PY + PY + PH) / 2;
    s += '<text x="'+xMid+'" y="'+(PY+PH+30)+'" text-anchor="middle" font-size="11">step</text>';
    s += '<text x="12" y="'+yMid+'" text-anchor="middle" font-size="11" transform="rotate(-90, 12, '+yMid+')">value</text>';
    s += '</g>';

    /* --- series polylines --- */
    s += '<g class="scriba-metricplot-series">';

    /* cost – solid */
    var costPts = [];
    for (var ci = 0; ci < n; ci++) {
      costPts.push(mapX(ci, n).toFixed(1)+','+mapY(d.cost[ci], yLo, yHi).toFixed(2));
    }
    s += '<g class="scriba-metricplot-series-0" data-scriba-series-name="cost">';
    s += '<polyline class="scriba-metricplot-line" points="'+costPts.join(' ')+'" fill="none" stroke="'+BLUE+'" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>';
    s += '</g>';

    /* temp – dashed */
    var tempPts = [];
    for (var ti = 0; ti < n; ti++) {
      tempPts.push(mapX(ti, n).toFixed(1)+','+mapY(d.temp[ti], yLo, yHi).toFixed(2));
    }
    s += '<g class="scriba-metricplot-series-1" data-scriba-series-name="temp">';
    s += '<polyline class="scriba-metricplot-line" points="'+tempPts.join(' ')+'" fill="none" stroke="'+RED+'" stroke-width="1.5" stroke-dasharray="6 3" stroke-linejoin="round" stroke-linecap="round"/>';
    s += '</g>';
    s += '</g>';

    /* --- step marker (vertical dashed line + dots at current step) --- */
    var markerX = mapX(n - 1, n).toFixed(1);
    var costCurY = mapY(d.cost[n - 1], yLo, yHi).toFixed(2);
    var tempCurY = mapY(d.temp[n - 1], yLo, yHi).toFixed(2);
    s += '<g class="scriba-metricplot-step-marker">';
    s += '<line class="scriba-metricplot-marker" x1="'+markerX+'" y1="'+PY+'" x2="'+markerX+'" y2="'+(PY+PH)+'" stroke="'+FG+'" stroke-width="1" stroke-dasharray="4 3" opacity="0.6"/>';
    s += '<circle class="scriba-metricplot-step-dot" cx="'+markerX+'" cy="'+costCurY+'" r="4" fill="'+BLUE+'"/>';
    s += '<circle class="scriba-metricplot-step-dot" cx="'+markerX+'" cy="'+tempCurY+'" r="4" fill="'+RED+'"/>';
    s += '</g>';

    /* --- legend --- */
    s += '<g class="scriba-metricplot-legend">';
    s += '<line x1="224" y1="20" x2="244" y2="20" stroke="'+BLUE+'" stroke-width="2"/>';
    s += '<text x="250" y="24" class="scriba-metricplot-legend-label" font-size="11">cost</text>';
    s += '<line x1="224" y1="36" x2="244" y2="36" stroke="'+RED+'" stroke-width="2" stroke-dasharray="6 3"/>';
    s += '<text x="250" y="40" class="scriba-metricplot-legend-label" font-size="11">temp</text>';
    s += '</g>';

    return '<svg class="scriba-stage-svg" viewBox="0 0 '+OUTER_W+' '+OUTER_H+'" role="img" xmlns="http://www.w3.org/2000/svg">'
      + '<g transform="translate(16,16)"><svg class="scriba-metricplot" viewBox="0 0 '+SVG_W+' '+SVG_H+'" data-scriba-series="cost,temp" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MetricPlot: cost, temp">'
      + s
      + '</svg></g></svg>';
  }

  /* ---- narration (Vietnamese co dau) ---- */
  var narrations = [
    "Gi\u00e1 tr\u1ecb kh\u1edfi \u0111\u1ea7u: cost\u00a0=\u00a010, temp\u00a0=\u00a0100. M\u1ed7i chu\u1ed7i ch\u1ec9 c\u00f3 m\u1ed9t \u0111i\u1ec3m duy nh\u1ea5t.",
    "B\u01b0\u1edbc 2: cost gi\u1ea3m xu\u1ed1ng 8, temp gi\u1ea3m xu\u1ed1ng 90. \u0110\u01b0\u1eddng n\u1ed1i hai \u0111i\u1ec3m cho m\u1ed7i chu\u1ed7i.",
    "B\u01b0\u1edbc 3: cost ti\u1ebfp t\u1ee5c gi\u1ea3m xu\u1ed1ng 5, temp xu\u1ed1ng 70. Polyline \u0111\u1ea7y \u0111\u1ee7 ba \u0111i\u1ec3m."
  ];

  /* ---- frames ---- */
  var frames = [];
  for (var f = 0; f < DATA.length; f++) {
    frames.push({ svg: buildSVG(f), narration: narrations[f] });
  }

  /* ---- widget controller ---- */
  var W = document.getElementById('test-metricplot');
  var cur = 0;
  var stage = W.querySelector('.scriba-stage');
  var narr  = W.querySelector('.scriba-narration');
  var ctr   = W.querySelector('.scriba-step-counter');
  var prev  = W.querySelector('.scriba-btn-prev');
  var next  = W.querySelector('.scriba-btn-next');
  var dots  = W.querySelectorAll('.scriba-dot');

  function show(i) {
    cur = i;
    stage.innerHTML = frames[i].svg;
    narr.textContent = frames[i].narration;
    ctr.textContent = 'Step ' + (i + 1) + ' / ' + frames.length;
    prev.disabled = i === 0;
    next.disabled = i === frames.length - 1;
    dots.forEach(function(d, j) {
      d.className = 'scriba-dot' + (j === i ? ' active' : j < i ? ' done' : '');
    });
  }

  prev.addEventListener('click', function() { if (cur > 0) show(cur - 1); });
  next.addEventListener('click', function() { if (cur < frames.length - 1) show(cur + 1); });
  W.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); if (cur < frames.length - 1) show(cur + 1); }
    if (e.key === 'ArrowLeft') { e.preventDefault(); if (cur > 0) show(cur - 1); }
  });
  W.setAttribute('tabindex', '0');
  show(0);
})();
</script>
</body>
</html>
