<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scriba — test_plane2d (expected)</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  max-width: 720px;
  margin: 2rem auto;
  padding: 0 1rem;
  background: #0d1117;
  color: #e6edf3;
}
h1 { font-size: 1.4rem; margin-bottom: 1.5rem; font-weight: 600; color: #e6edf3; }

/* Widget container — dark */
.scriba-widget {
  border: 1px solid #30363d;
  border-radius: 10px;
  background: #1e1e2e;
  overflow: hidden;
  outline: none;
}

/* Controls bar */
.scriba-controls {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.6rem 1rem;
  background: #181825;
  border-bottom: 1px solid #30363d;
  user-select: none;
}
.scriba-controls button {
  background: #21262d;
  border: 1px solid #30363d;
  border-radius: 6px;
  padding: 0.3rem 0.7rem;
  font-size: 0.8rem;
  cursor: pointer;
  color: #e6edf3;
  transition: background 0.15s, border-color 0.15s;
}
.scriba-controls button:hover { background: #30363d; border-color: #484f58; }
.scriba-controls button:active { background: #3d444d; }
.scriba-controls button:disabled { opacity: 0.35; cursor: default; }
.scriba-step-counter {
  font: 600 0.78rem ui-monospace, "SF Mono", monospace;
  color: #7d8590;
  min-width: 5rem;
  text-align: center;
}

/* Progress dots */
.scriba-progress {
  display: flex;
  gap: 4px;
  margin-left: auto;
}
.scriba-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #30363d;
  transition: background 0.2s;
}
.scriba-dot.active { background: #0072B2; }
.scriba-dot.done   { background: #009E73; }

/* Stage */
.scriba-stage {
  padding: 1.25rem 1rem;
  display: flex;
  justify-content: center;
  min-height: 100px;
}
.scriba-stage-svg { width: 100%; height: auto; }

/* Narration */
.scriba-narration {
  padding: 0.75rem 1rem;
  font-size: 0.92rem;
  line-height: 1.55;
  color: #cdd6f4;
  border-top: 1px solid #30363d;
  min-height: 2.5rem;
}

/* Frame transition */
.scriba-stage svg, .scriba-narration {
  transition: opacity 0.2s ease;
}
</style>
</head>
<body>
<h1>test_plane2d</h1>
<div class="scriba-widget" id="test-plane2d">
  <div class="scriba-controls">
    <button class="scriba-btn-prev" disabled>Prev</button>
    <span class="scriba-step-counter">Step 1 / 3</span>
    <button class="scriba-btn-next">Next</button>
    <div class="scriba-progress">
      <div class="scriba-dot active"></div>
      <div class="scriba-dot"></div>
      <div class="scriba-dot"></div>
    </div>
  </div>
  <div class="scriba-stage"></div>
  <p class="scriba-narration"></p>
</div>
<script>
(function(){
  /* ---- coordinate math ---- */
  var xMin=-3, xMax=3, yMin=-3, yMax=3;
  var margin=32, size=320;           // inner SVG size
  var plotW=size-2*margin;           // 256
  var plotH=size-2*margin;
  var outerSize=size+32;             // 352 viewBox for outer SVG padding

  function xToSvg(x){ return margin + (x-xMin)/(xMax-xMin)*plotW; }
  function yToSvg(y){ return margin + (yMax-y)/(yMax-yMin)*plotH; } // Y flipped

  /* ---- grid lines ---- */
  var gridLines='';
  for(var gx=xMin; gx<=xMax; gx++){
    var sx=xToSvg(gx);
    gridLines+='<line x1="'+sx.toFixed(2)+'" y1="'+margin+'" x2="'+sx.toFixed(2)+'" y2="'+(size-margin)+'" stroke="#3b3b4f" stroke-width="0.5" opacity="0.5"/>';
  }
  for(var gy=yMin; gy<=yMax; gy++){
    var sy=yToSvg(gy);
    gridLines+='<line x1="'+margin+'" y1="'+sy.toFixed(2)+'" x2="'+(size-margin)+'" y2="'+sy.toFixed(2)+'" stroke="#3b3b4f" stroke-width="0.5" opacity="0.5"/>';
  }

  /* ---- axes ---- */
  var ox=xToSvg(0), oy=yToSvg(0);
  var axes='';
  // x-axis
  axes+='<line x1="'+margin+'" y1="'+oy+'" x2="'+(size-margin)+'" y2="'+oy+'" stroke="#cdd6f4" stroke-width="1.5"/>';
  axes+='<path d="M '+(size-margin)+' '+oy+' l -6 -3 l 0 6 Z" fill="#cdd6f4"/>';
  // y-axis
  axes+='<line x1="'+ox+'" y1="'+(size-margin)+'" x2="'+ox+'" y2="'+margin+'" stroke="#cdd6f4" stroke-width="1.5"/>';
  axes+='<path d="M '+ox+' '+margin+' l -3 6 l 6 0 Z" fill="#cdd6f4"/>';

  /* ---- tick labels ---- */
  var labels='';
  for(var tx=xMin; tx<=xMax; tx++){
    if(tx===0) continue;
    labels+='<text x="'+xToSvg(tx).toFixed(2)+'" y="'+(oy+14)+'" text-anchor="middle" font-size="10" fill="#7d8590">'+tx+'</text>';
  }
  for(var ty=yMin; ty<=yMax; ty++){
    if(ty===0) continue;
    labels+='<text x="'+(ox-8)+'" y="'+(yToSvg(ty)+3).toFixed(2)+'" text-anchor="end" font-size="10" fill="#7d8590">'+ty+'</text>';
  }

  /* ---- colors (Wong CVD palette) ---- */
  var colCurrent='#0072B2';
  var colDone='#009E73';

  /* ---- helper: circle at math coords ---- */
  function circle(mx,my,col){
    return '<circle cx="'+xToSvg(mx).toFixed(2)+'" cy="'+yToSvg(my).toFixed(2)+'" r="4" fill="'+col+'" stroke="'+col+'" stroke-width="1.5"/>';
  }

  /* ---- helper: line y=mx+b clipped to viewport ---- */
  function lineYeqX(col){
    // y=x clipped to [-3,3] x [-3,3]: from (-3,-3) to (3,3)
    var x1c=Math.max(xMin, yMin), y1c=x1c;
    var x2c=Math.min(xMax, yMax), y2c=x2c;
    return '<line x1="'+xToSvg(x1c).toFixed(2)+'" y1="'+yToSvg(y1c).toFixed(2)+'" x2="'+xToSvg(x2c).toFixed(2)+'" y2="'+yToSvg(y2c).toFixed(2)+'" stroke="'+col+'" stroke-width="1.5"/>';
  }

  /* ---- helper: line label ---- */
  function lineLabel(text,x,y){
    return '<text x="'+xToSvg(x).toFixed(2)+'" y="'+(yToSvg(y)-8).toFixed(2)+'" font-size="10" fill="#cdd6f4">'+text+'</text>';
  }

  /* ---- build SVG wrapper ---- */
  function buildSvg(content, extraLabels){
    return '<svg class="scriba-stage-svg" viewBox="0 0 '+outerSize+' '+outerSize+'" role="img" xmlns="http://www.w3.org/2000/svg">'
      +'<g transform="translate(16,16)">'
      +'<rect width="'+size+'" height="'+size+'" rx="4" fill="#1e1e2e"/>'
      +'<g class="scriba-plane-grid">'+gridLines+'</g>'
      +'<g class="scriba-plane-axes">'+axes+'</g>'
      +'<g class="scriba-plane-content">'+content+'</g>'
      +'<g class="scriba-plane-labels">'+labels+(extraLabels||'')+'</g>'
      +'</g></svg>';
  }

  /* ---- frames ---- */
  var frames=[
    {
      svg: buildSvg(
        circle(1,2,colCurrent)
      ),
      narration: "Th\u00EAm \u0111i\u1EC3m t\u1EA1i t\u1ECDa \u0111\u1ED9 (1,\u20092)."
    },
    {
      svg: buildSvg(
        lineYeqX(colCurrent)
        + circle(1,2,colDone),
        lineLabel('y=x',3,3)
      ),
      narration: "Th\u00EAm \u0111\u01B0\u1EDDng th\u1EB3ng y\u2009=\u2009x."
    },
    {
      svg: buildSvg(
        lineYeqX(colDone)
        + circle(1,2,colDone)
        + circle(-1,-1,colCurrent),
        lineLabel('y=x',3,3)
      ),
      narration: "Th\u00EAm \u0111i\u1EC3m th\u1EE9 hai t\u1EA1i (\u22121,\u2009\u22121)."
    }
  ];

  /* ---- widget logic ---- */
  var W=document.getElementById('test-plane2d');
  var cur=0;
  var stage=W.querySelector('.scriba-stage');
  var narr=W.querySelector('.scriba-narration');
  var ctr=W.querySelector('.scriba-step-counter');
  var prev=W.querySelector('.scriba-btn-prev');
  var next=W.querySelector('.scriba-btn-next');
  var dots=W.querySelectorAll('.scriba-dot');

  function show(i){
    cur=i;
    stage.innerHTML=frames[i].svg;
    narr.textContent=frames[i].narration;
    ctr.textContent='Step '+(i+1)+' / '+frames.length;
    prev.disabled=i===0;
    next.disabled=i===frames.length-1;
    dots.forEach(function(d,j){
      d.className='scriba-dot'+(j===i?' active':j<i?' done':'');
    });
  }

  prev.addEventListener('click',function(){ if(cur>0) show(cur-1); });
  next.addEventListener('click',function(){ if(cur<frames.length-1) show(cur+1); });
  W.addEventListener('keydown',function(e){
    if(e.key==='ArrowRight'||e.key===' '){ e.preventDefault(); if(cur<frames.length-1) show(cur+1); }
    if(e.key==='ArrowLeft'){ e.preventDefault(); if(cur>0) show(cur-1); }
  });
  W.setAttribute('tabindex','0');
  show(0);
})();
</script>
</body>
</html>
