<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scriba — test_fastforward</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  max-width: 720px;
  margin: 2rem auto;
  padding: 0 1rem;
  background: #0d1117;
  color: #e6edf3;
}
h1 { font-size: 1.4rem; margin-bottom: 1.5rem; font-weight: 600; }

/* Widget container */
.scriba-widget {
  border: 1px solid #30363d;
  border-radius: 10px;
  background: #161b22;
  overflow: hidden;
}

/* Controls bar */
.scriba-controls {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.6rem 1rem;
  background: #1c2128;
  border-bottom: 1px solid #30363d;
  user-select: none;
}
.scriba-controls button {
  background: #21262d;
  border: 1px solid #30363d;
  border-radius: 6px;
  padding: 0.3rem 0.7rem;
  font-size: 0.8rem;
  cursor: pointer;
  color: #e6edf3;
  transition: background 0.15s, border-color 0.15s;
}
.scriba-controls button:hover { background: #30363d; border-color: #484f58; }
.scriba-controls button:active { background: #3d444d; }
.scriba-controls button:disabled { opacity: 0.35; cursor: default; }
.scriba-step-counter {
  font: 600 0.78rem ui-monospace, "SF Mono", monospace;
  color: #7d8590;
  min-width: 5rem;
  text-align: center;
}

/* Progress dots */
.scriba-progress {
  display: flex;
  gap: 4px;
  margin-left: auto;
}
.scriba-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #30363d;
  transition: background 0.2s;
}
.scriba-dot.active { background: #0072B2; }
.scriba-dot.done { background: #009E73; }

/* Stage */
.scriba-stage {
  padding: 1.25rem 1rem;
  display: flex;
  justify-content: center;
  min-height: 100px;
}
.scriba-stage-svg { width: 100%; height: auto; }

/* Narration */
.scriba-narration {
  padding: 0.75rem 1rem;
  font-size: 0.92rem;
  line-height: 1.55;
  color: #e6edf3;
  border-top: 1px solid #21262d;
  min-height: 2.5rem;
}

/* SVG text */
svg text {
  font: 700 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  text-anchor: middle;
  dominant-baseline: central;
}
.idx {
  font: 500 10px ui-monospace, monospace;
  fill: #7d8590;
}

/* Frame transition */
.scriba-stage svg, .scriba-narration {
  transition: opacity 0.2s ease;
}

/* Theme toggle */
.theme-toggle {
  position: fixed; top: 1rem; right: 1rem;
  padding: 0.35rem 0.7rem; cursor: pointer;
  border: 1px solid #30363d; border-radius: 6px; background: #21262d;
  color: #e6edf3; font-size: 0.8rem;
}
</style>
</head>
<body>
<h1>test_fastforward</h1>
<div class="scriba-widget" id="test-ff">
  <div class="scriba-controls">
    <button class="scriba-btn-prev" disabled>Prev</button>
    <span class="scriba-step-counter">B\u01b0\u1edbc 1 / 4</span>
    <button class="scriba-btn-next">Next</button>
    <div class="scriba-progress">
      <div class="scriba-dot active"></div>
      <div class="scriba-dot"></div>
      <div class="scriba-dot"></div>
      <div class="scriba-dot"></div>
    </div>
  </div>
  <div class="scriba-stage"></div>
  <p class="scriba-narration"></p>
</div>
<script>
(function(){
  var W=document.getElementById('test-ff');

  /* Wong CVD palette — dark mode cell colors */
  var cellFill='#21262d';
  var cellStroke='#30363d';
  var cellText='#e6edf3';

  function arraySvg(){
    return '<svg class="scriba-stage-svg" viewBox="0 0 340 72" role="img" xmlns="http://www.w3.org/2000/svg">'
    +'<g transform="translate(16,16)">'
    +'<g data-primitive="array" data-shape="a">'
    +'  <g data-target="a.cell[0]" class="scriba-state-idle">'
    +'    <rect x="0" y="0" width="60" height="40" rx="4" fill="'+cellFill+'" stroke="'+cellStroke+'" stroke-width="1.5"/>'
    +'    <text x="30" y="20" fill="'+cellText+'">5</text>'
    +'  </g>'
    +'  <g data-target="a.cell[1]" class="scriba-state-idle">'
    +'    <rect x="62" y="0" width="60" height="40" rx="4" fill="'+cellFill+'" stroke="'+cellStroke+'" stroke-width="1.5"/>'
    +'    <text x="92" y="20" fill="'+cellText+'">3</text>'
    +'  </g>'
    +'  <g data-target="a.cell[2]" class="scriba-state-idle">'
    +'    <rect x="124" y="0" width="60" height="40" rx="4" fill="'+cellFill+'" stroke="'+cellStroke+'" stroke-width="1.5"/>'
    +'    <text x="154" y="20" fill="'+cellText+'">1</text>'
    +'  </g>'
    +'  <g data-target="a.cell[3]" class="scriba-state-idle">'
    +'    <rect x="186" y="0" width="60" height="40" rx="4" fill="'+cellFill+'" stroke="'+cellStroke+'" stroke-width="1.5"/>'
    +'    <text x="216" y="20" fill="'+cellText+'">4</text>'
    +'  </g>'
    +'  <g data-target="a.cell[4]" class="scriba-state-idle">'
    +'    <rect x="248" y="0" width="60" height="40" rx="4" fill="'+cellFill+'" stroke="'+cellStroke+'" stroke-width="1.5"/>'
    +'    <text x="278" y="20" fill="'+cellText+'">2</text>'
    +'  </g>'
    +'</g>'
    +'</g>'
    +'</svg>';
  }

  var svg=arraySvg();
  var frames=[
    {svg:svg, narration:'M\u1ea3ng ban \u0111\u1ea7u.'},
    {svg:svg, narration:'Iteration 50 / 100.'},
    {svg:svg, narration:'Iteration 100 / 100.'},
    {svg:svg, narration:'Ho\u00e0n t\u1ea5t sau 100 iteration.'}
  ];

  var cur=0;
  var stage=W.querySelector('.scriba-stage');
  var narr=W.querySelector('.scriba-narration');
  var ctr=W.querySelector('.scriba-step-counter');
  var prev=W.querySelector('.scriba-btn-prev');
  var next=W.querySelector('.scriba-btn-next');
  var dots=W.querySelectorAll('.scriba-dot');

  function show(i){
    cur=i;
    stage.innerHTML=frames[i].svg;
    narr.textContent=frames[i].narration;
    ctr.textContent='B\u01b0\u1edbc '+(i+1)+' / '+frames.length;
    prev.disabled=i===0;
    next.disabled=i===frames.length-1;
    dots.forEach(function(d,j){d.className='scriba-dot'+(j===i?' active':j<i?' done':'');});
  }

  prev.addEventListener('click',function(){if(cur>0)show(cur-1);});
  next.addEventListener('click',function(){if(cur<frames.length-1)show(cur+1);});
  W.addEventListener('keydown',function(e){
    if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();if(cur<frames.length-1)show(cur+1);}
    if(e.key==='ArrowLeft'){e.preventDefault();if(cur>0)show(cur-1);}
  });
  W.setAttribute('tabindex','0');
  show(0);
})();
</script>
</body>
</html>
