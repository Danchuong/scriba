<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scriba — Zuma Interval DP (Expected)</title>
<style>
/* ── Reset & Base ─────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:"Inter","SF Pro Text",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:#13131a;color:#e0e0e8;
  max-width:780px;margin:0 auto;padding:1.5rem 1rem 3rem;
  line-height:1.55;
}

/* ── Wong CVD-safe palette ────────────────────────── */
:root{
  --idle:    #f6f8fa;
  --current: #0072B2;
  --done:    #009E73;
  --error:   #D55E00;
  --good:    #56B4E9;
  --dim:     #e8e8e8;
  --bg-widget: #1e1e2e;
  --bg-svg:    #252536;
  --border:    #35354a;
  --text:      #e0e0e8;
  --text-dim:  #8888a0;
}

/* ── Title ────────────────────────────────────────── */
h1{
  font-size:1.35rem;font-weight:700;
  margin-bottom:1.2rem;
  background:linear-gradient(135deg,var(--good),var(--current));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:-0.02em;
}

/* ── Widget chrome ────────────────────────────────── */
.widget{
  background:var(--bg-widget);
  border:1px solid var(--border);
  border-radius:12px;overflow:hidden;
}
.controls{
  display:flex;align-items:center;gap:.7rem;
  padding:.55rem 1rem;
  background:#1a1a28;border-bottom:1px solid var(--border);
  user-select:none;
}
.controls button{
  background:#2a2a3e;border:1px solid var(--border);
  border-radius:6px;padding:.3rem .75rem;
  font-size:.78rem;color:var(--text);cursor:pointer;
  transition:background .15s,border-color .15s;
}
.controls button:hover{background:#35354a;border-color:#555}
.controls button:active{background:#444}
.controls button:disabled{opacity:.3;cursor:default}
.step-label{font-size:.78rem;color:var(--text-dim);margin-left:auto}

/* ── Canvas area ──────────────────────────────────── */
.canvas{padding:1.2rem;min-height:340px;position:relative}
.step{display:none}
.step.active{display:block}

/* ── Narration ────────────────────────────────────── */
.narration{
  padding:.9rem 1.2rem;
  border-top:1px solid var(--border);
  font-size:.85rem;color:var(--text-dim);
  line-height:1.6;
}
.narration strong{color:var(--good)}

/* ── SVG helpers ──────────────────────────────────── */
svg text{font-family:inherit}
.cell-idle{fill:#2a2a3e;stroke:var(--border);stroke-width:1}
.cell-current{fill:var(--current);stroke:var(--current);stroke-width:1.5}
.cell-done{fill:var(--done);stroke:var(--done);stroke-width:1.5}
.cell-good{fill:var(--good);stroke:var(--good);stroke-width:1.5}
.cell-dim{fill:#1e1e2e;stroke:var(--border);stroke-width:1}
.gem-R{fill:#D55E00}
.gem-B{fill:#0072B2}
.label{fill:var(--text);font-size:11px;text-anchor:middle;dominant-baseline:central}
.label-dim{fill:var(--text-dim);font-size:10px;text-anchor:middle;dominant-baseline:central}
.val{fill:#fff;font-size:12px;font-weight:700;text-anchor:middle;dominant-baseline:central}
.arrow{stroke:var(--good);stroke-width:1.5;fill:none;marker-end:url(#arrowG)}
.arrow-current{stroke:var(--current);stroke-width:1.5;fill:none;marker-end:url(#arrowC)}
.substory-frame{fill:none;stroke:var(--good);stroke-width:2;stroke-dasharray:6,3;rx:8}

/* ── Responsive ───────────────────────────────────── */
@media(max-width:500px){
  body{padding:1rem .5rem 2rem}
  .canvas{padding:.8rem}
  h1{font-size:1.15rem}
  .controls{padding:.45rem .7rem}
}
</style>
</head>

  '<strong>Buoc 4:</strong> Dien dp[1][2] voi chuoi con "BB". Vi s[1] = s[2] = B (cung mau!), hai vien nay gop lai va xoa chi 1 lan. dp[1][2] = 1. Day la <strong>merge</strong> &mdash; yeu to quan trong cua Zuma DP.',
  '<strong>Buoc 5 (Substory):</strong> Drill into dp[2][5] cho chuoi con "BRBR" (4 phan tu). Thu tat ca diem chia k=2,3,4. Moi truong hop deu cho gia tri 4. Vi s[2]=B != s[5]=R nen khong gop dau mut duoc. Ket qua dp[2][5] = 4.',
  '<strong>Buoc 6:</strong> Bang DP da dien day. Ket qua cuoi cung: dp[0][5] = <strong>4</strong>. Can toi thieu 4 buoc de xoa het day vien da "RBBRBR". O goc tren phai (dp[0][5]) duoc to mau xanh la cay.'
];

let step = 0;
const total = NARRATIONS.length;
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const label = document.getElementById('stepLabel');
const narration = document.getElementById('narration');

function render() {
  document.querySelectorAll('.step').forEach((el, i) => {
    el.classList.toggle('active', i === step);
  });
  narration.innerHTML = NARRATIONS[step];
  label.textContent = `Step ${step + 1} / ${total}`;
  prevBtn.disabled = step === 0;
  nextBtn.disabled = step === total - 1;
}
prevBtn.addEventListener('click', () => { if (step > 0) { step--; render(); } });
nextBtn.addEventListener('click', () => { if (step < total - 1) { step++; render(); } });
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') prevBtn.click();
  if (e.key === 'ArrowRight') nextBtn.click();
});
</script>
</body>
</html>
