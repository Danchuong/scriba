<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scriba — h09_simulated_annealing</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  max-width: 900px;
  margin: 2rem auto;
  padding: 0 1rem;
  background: #fafafa;
  color: #212529;
}
h1 { font-size: 1.4rem; margin-bottom: 1.5rem; font-weight: 600; }

/* Widget container */
.scriba-widget {
  border: 1px solid #d0d7de;
  border-radius: 10px;
  background: #ffffff;
  overflow: hidden;
}

/* Controls bar */
.scriba-controls {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.6rem 1rem;
  background: #f6f8fa;
  border-bottom: 1px solid #d0d7de;
  user-select: none;
}
.scriba-controls button {
  background: #ffffff;
  border: 1px solid #d0d7de;
  border-radius: 6px;
  padding: 0.3rem 0.7rem;
  font-size: 0.8rem;
  cursor: pointer;
  color: #212529;
  transition: background 0.15s, border-color 0.15s;
}
.scriba-controls button:hover { background: #f0f0f0; border-color: #bbb; }
.scriba-controls button:active { background: #e4e4e4; }
.scriba-controls button:disabled { opacity: 0.35; cursor: default; }
.scriba-step-counter {
  font: 600 0.78rem ui-monospace, "SF Mono", monospace;
  color: #6c757d;
  min-width: 5rem;
  text-align: center;
}

/* Progress dots */
.scriba-progress {
  display: flex;
  gap: 4px;
  margin-left: auto;
}
.scriba-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #d0d7de;
  transition: background 0.2s;
}
.scriba-dot.active { background: #0072B2; }
.scriba-dot.done { background: #009E73; }

/* Stage */
.scriba-stage {
  padding: 1.25rem 1rem;
  display: flex;
  justify-content: center;
  min-height: 100px;
}
.scriba-stage-svg { width: 100%; height: auto; }

/* Narration */
.scriba-narration {
  padding: 0.75rem 1rem;
  font-size: 0.92rem;
  line-height: 1.55;
  color: #212529;
  border-top: 1px solid #f0f0f0;
  min-height: 2.5rem;
}

/* SVG text */
svg text {
  font: 700 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  text-anchor: middle;
  dominant-baseline: central;
}
.idx {
  font: 500 10px ui-monospace, monospace;
  fill: #6c757d;
}

/* Frame transition */
.scriba-stage svg, .scriba-narration {
  transition: opacity 0.2s ease;
}

/* Theme toggle */
.theme-toggle {
  position: fixed; top: 1rem; right: 1rem;
  padding: 0.35rem 0.7rem; cursor: pointer;
  border: 1px solid #ccc; border-radius: 6px; background: white;
  font-size: 0.8rem;
}

/* Dark mode */
[data-theme="dark"] body { background: #0d1117; color: #e6edf3; }
[data-theme="dark"] .scriba-widget { background: #161b22; border-color: #30363d; }
[data-theme="dark"] .scriba-controls { background: #1c2128; border-color: #30363d; }
[data-theme="dark"] .scriba-controls button { background: #21262d; border-color: #30363d; color: #e6edf3; }
[data-theme="dark"] .scriba-controls button:hover { background: #30363d; }
[data-theme="dark"] .scriba-step-counter { color: #7d8590; }
[data-theme="dark"] .scriba-narration { color: #e6edf3; border-color: #21262d; }
[data-theme="dark"] .scriba-dot { background: #30363d; }
[data-theme="dark"] .idx { fill: #7d8590; }
[data-theme="dark"] .theme-toggle { background: #21262d; color: #e6edf3; border-color: #30363d; }
</style>
</head>
<body>
<button class="theme-toggle" onclick="
  var t = document.documentElement.dataset.theme;
  document.documentElement.dataset.theme = t === 'dark' ? 'light' : 'dark';
">Toggle theme</button>
<h1>h09_simulated_annealing</h1>
<div class="scriba-widget" id="sim-anneal">
  <div class="scriba-controls">
    <button class="scriba-btn-prev" disabled>Prev</button>
    <span class="scriba-step-counter">Step 1 / 9</span>
    <button class="scriba-btn-next">Next</button>
    <div class="scriba-progress">
      <div class="scriba-dot active"></div>
      <div class="scriba-dot"></div>
      <div class="scriba-dot"></div>
      <div class="scriba-dot"></div>
      <div class="scriba-dot"></div>
      <div class="scriba-dot"></div>
      <div class="scriba-dot"></div>
      <div class="scriba-dot"></div>
      <div class="scriba-dot"></div>
    </div>
  </div>
  <div class="scriba-stage"></div>
  <p class="scriba-narration"></p>
</div>
<script>
(function(){
  /* 6 cities at fixed positions (map-like layout) */
  var cities = {
    A: {x:80,  y:40,  label:'A'},
    B: {x:220, y:30,  label:'B'},
    C: {x:310, y:110, label:'C'},
    D: {x:260, y:210, label:'D'},
    E: {x:120, y:230, label:'E'},
    F: {x:40,  y:130, label:'F'}
  };
  var cityKeys = ['A','B','C','D','E','F'];
  var graphW = 380, graphH = 280;
  var chartW = 380, chartH = 180;
  var chartL = 50, chartR = 370, chartT = 20, chartB = 160;

  /* Palette */
  var COL = {
    idle:'#f6f8fa', current:'#0072B2', done:'#009E73',
    error:'#D55E00', good:'#56B4E9', dim:'#e8e8e8',
    costLine:'#0072B2', tempLine:'#D55E00',
    nodeFill:'#f6f8fa', nodeStroke:'#d0d7de'
  };

  /* Tour data per step:
     Step 1: initial  A-B-C-D-E-F-A  cost=48  T=100
     Step 2: 2-opt reverse [C,D]->  A-B-D-C-E-F-A  cost=44  T=100
     Step 3: worse accepted A-B-D-F-E-C-A  cost=47 T=80  (accepted by prob)
     Step 4: T drops, improvement A-B-D-E-F-C-A  cost=42  T=64
     Step 5: improvement  A-B-D-E-C-F-A  cost=39  T=51
     Step 6: improvement  A-B-C-E-D-F-A  cost=37  T=41
     Step 7: improvement  A-F-D-E-C-B-A  cost=35  T=33
     Step 8: converged  A-F-E-D-C-B-A  cost=32  T=26
     Step 9: final  same  cost=32  T=21
  */
  var tours = [
    ['A','B','C','D','E','F'],
    ['A','B','D','C','E','F'],
    ['A','B','D','F','E','C'],
    ['A','B','D','E','F','C'],
    ['A','B','D','E','C','F'],
    ['A','B','C','E','D','F'],
    ['A','F','D','E','C','B'],
    ['A','F','E','D','C','B'],
    ['A','F','E','D','C','B']
  ];

  function dist(a,b){
    var dx=cities[a].x-cities[b].x, dy=cities[a].y-cities[b].y;
    return Math.sqrt(dx*dx+dy*dy);
  }
  /* Precompute realistic costs */
  function tourCost(tour){
    var s=0;
    for(var i=0;i<tour.length;i++){
      s+=dist(tour[i], tour[(i+1)%tour.length]);
    }
    return Math.round(s);
  }

  var costs=[], temps=[];
  var T0=100, alpha=0.8;
  for(var i=0;i<tours.length;i++){
    costs.push(tourCost(tours[i]));
    temps.push(Math.round(T0*Math.pow(alpha,i)));
  }

  /* Edge state per step */
  var edgeStates = [
    'idle','idle','error','current','current','current','done','done','done'
  ];

  function buildTourSvg(stepIdx) {
    var tour = tours[stepIdx];
    var estate = edgeStates[stepIdx];
    var svg = '';
    /* edges */
    var edgeCol = estate==='idle'?'#d0d7de':estate==='current'?COL.current:estate==='done'?COL.done:estate==='error'?COL.error:COL.good;
    var edgeSW = estate==='idle'?1.5:2.5;
    for(var i=0;i<tour.length;i++){
      var a=cities[tour[i]], b=cities[tour[(i+1)%tour.length]];
      svg += '<line x1="'+a.x+'" y1="'+a.y+'" x2="'+b.x+'" y2="'+b.y+'" stroke="'+edgeCol+'" stroke-width="'+edgeSW+'" stroke-linecap="round"/>';
    }
    /* direction arrows (small) on first edge */
    var a0=cities[tour[0]], a1=cities[tour[1]];
    var mx=(a0.x+a1.x)/2, my=(a0.y+a1.y)/2;
    var ang=Math.atan2(a1.y-a0.y,a1.x-a0.x);
    var ax1=mx-6*Math.cos(ang-0.4), ay1=my-6*Math.sin(ang-0.4);
    var ax2=mx-6*Math.cos(ang+0.4), ay2=my-6*Math.sin(ang+0.4);
    svg += '<polygon points="'+mx+','+my+' '+ax1+','+ay1+' '+ax2+','+ay2+'" fill="'+edgeCol+'"/>';

    /* city nodes */
    for(var i=0;i<cityKeys.length;i++){
      var c = cities[cityKeys[i]];
      svg += '<circle cx="'+c.x+'" cy="'+c.y+'" r="16" fill="'+COL.nodeFill+'" stroke="'+COL.nodeStroke+'" stroke-width="1.5"/>';
      svg += '<text x="'+c.x+'" y="'+c.y+'" fill="#212529">'+c.label+'</text>';
    }
    /* cost label */
    svg += '<text x="190" y="270" style="font:600 12px sans-serif;fill:#6c757d">cost = '+costs[stepIdx]+'  |  T = '+temps[stepIdx]+'</text>';
    return svg;
  }

  function buildChartSvg(stepIdx) {
    var svg = '';
    var maxCost = Math.max.apply(null, costs) + 20;
    var maxTemp = 110;
    var n = stepIdx + 1;

    /* grid */
    svg += '<rect x="'+chartL+'" y="'+chartT+'" width="'+(chartR-chartL)+'" height="'+(chartB-chartT)+'" fill="none" stroke="#e8e8e8" stroke-width="0.5"/>';
    for(var g=0;g<5;g++){
      var gy = chartT + g*(chartB-chartT)/4;
      svg += '<line x1="'+chartL+'" y1="'+gy+'" x2="'+chartR+'" y2="'+gy+'" stroke="#f0f0f0" stroke-width="0.5"/>';
    }
    /* Y axis labels */
    svg += '<text x="'+(chartL-5)+'" y="'+chartT+'" style="font:400 9px sans-serif;fill:#999;text-anchor:end">'+maxCost+'</text>';
    svg += '<text x="'+(chartL-5)+'" y="'+chartB+'" style="font:400 9px sans-serif;fill:#999;text-anchor:end">0</text>';
    /* X axis */
    svg += '<text x="'+((chartL+chartR)/2)+'" y="'+(chartB+16)+'" style="font:400 9px sans-serif;fill:#999">iteration</text>';

    function cx(i){ return chartL + i*(chartR-chartL)/(tours.length-1); }
    function cyC(v){ return chartB - (v/maxCost)*(chartB-chartT); }
    function cyT(v){ return chartB - (v/maxTemp)*(chartB-chartT); }

    /* cost polyline */
    if(n>0){
      var pts = [];
      for(var i=0;i<n;i++) pts.push(cx(i)+','+cyC(costs[i]));
      svg += '<polyline points="'+pts.join(' ')+'" fill="none" stroke="'+COL.costLine+'" stroke-width="2" stroke-linejoin="round"/>';
      /* dots */
      for(var i=0;i<n;i++){
        svg += '<circle cx="'+cx(i)+'" cy="'+cyC(costs[i])+'" r="3" fill="'+COL.costLine+'"/>';
      }
    }
    /* temp polyline */
    if(n>0){
      var pts2 = [];
      for(var i=0;i<n;i++) pts2.push(cx(i)+','+cyT(temps[i]));
      svg += '<polyline points="'+pts2.join(' ')+'" fill="none" stroke="'+COL.tempLine+'" stroke-width="2" stroke-dasharray="4 2" stroke-linejoin="round"/>';
      for(var i=0;i<n;i++){
        svg += '<circle cx="'+cx(i)+'" cy="'+cyT(temps[i])+'" r="3" fill="'+COL.tempLine+'"/>';
      }
    }

    /* Legend */
    svg += '<line x1="'+(chartR-120)+'" y1="'+(chartT+8)+'" x2="'+(chartR-100)+'" y2="'+(chartT+8)+'" stroke="'+COL.costLine+'" stroke-width="2"/>';
    svg += '<text x="'+(chartR-95)+'" y="'+(chartT+8)+'" style="font:500 10px sans-serif;fill:'+COL.costLine+';text-anchor:start">cost</text>';
    svg += '<line x1="'+(chartR-120)+'" y1="'+(chartT+22)+'" x2="'+(chartR-100)+'" y2="'+(chartT+22)+'" stroke="'+COL.tempLine+'" stroke-width="2" stroke-dasharray="4 2"/>';
    svg += '<text x="'+(chartR-95)+'" y="'+(chartT+22)+'" style="font:500 10px sans-serif;fill:'+COL.tempLine+';text-anchor:start">temp</text>';

    return svg;
  }

  function buildFrame(stepIdx) {
    var tourSvg = buildTourSvg(stepIdx);
    var chartSvg = buildChartSvg(stepIdx);
    return '<svg class="scriba-stage-svg" viewBox="0 0 420 490" role="img" xmlns="http://www.w3.org/2000/svg">'+
      '<g transform="translate(16,10)">'+tourSvg+'</g>'+
      '<g transform="translate(16,300)">'+chartSvg+'</g>'+
      '</svg>';
  }

  var narrations = [
    'Simulated Annealing (SA) giai bai TSP 6 thanh pho. Bat dau voi tour ngau nhien. Nhiet do T cao -> chap nhan ca loi giam lan tang chi phi voi xac suat exp(-dE/T). Tour: A-B-C-D-E-F-A, cost='+costs[0]+', T='+temps[0]+'.',
    'Buoc 1: Thu dao doan 2-opt [C,D]. Tour moi A-B-D-C-E-F-A. Chi phi giam '+costs[0]+' -> '+costs[1]+'. Cai thien! Chap nhan ngay. T='+temps[1]+'.',
    'Buoc 2: Thu dao doan [D,F,E,C]. Tour A-B-D-F-E-C-A. Chi phi TANG '+costs[1]+' -> '+costs[2]+'. T='+temps[2]+' con cao -> xac suat chap nhan = exp(-'+Math.abs(costs[2]-costs[1])+'/'+temps[2]+') kha lon. Chap nhan loi xau!',
    'Buoc 3: Dao doan -> A-B-D-E-F-C-A. Chi phi giam '+costs[2]+' -> '+costs[3]+'. T='+temps[3]+'. Cai thien, chap nhan.',
    'Buoc 4: Dao tiep -> A-B-D-E-C-F-A. Chi phi '+costs[3]+' -> '+costs[4]+'. T='+temps[4]+'. Xu huong giam dan.',
    'Buoc 5: Dao -> A-B-C-E-D-F-A. Chi phi '+costs[4]+' -> '+costs[5]+'. T='+temps[5]+'. Nhiet do thap dan, kho chap nhan loi xau hon.',
    'Buoc 6: Dao lon -> A-F-D-E-C-B-A. Chi phi '+costs[5]+' -> '+costs[6]+'. T='+temps[6]+'. Tour dang hoi tu.',
    'Buoc 7: Dao -> A-F-E-D-C-B-A. Chi phi '+costs[6]+' -> '+costs[7]+'. T='+temps[7]+'. Tour gan toi uu. Tat ca canh done.',
    'Hoan tat. Tour toi uu: A-F-E-D-C-B-A, cost='+costs[8]+'. Bieu do: cost co vai "bump" ban dau (chap nhan loi xau khi T cao), sau do hoi tu. Temp giam theo ham mu. SA tim nghiem gan dung tot cho NP-hard.'
  ];

  var frames = [];
  for(var i=0;i<9;i++){
    frames.push({svg: buildFrame(i), narration: narrations[i]});
  }

  var W=document.getElementById('sim-anneal');
  var cur=0;
  var stage=W.querySelector('.scriba-stage');
  var narr=W.querySelector('.scriba-narration');
  var ctr=W.querySelector('.scriba-step-counter');
  var prev=W.querySelector('.scriba-btn-prev');
  var next=W.querySelector('.scriba-btn-next');
  var dots=W.querySelectorAll('.scriba-dot');
  function show(i){
    cur=i;
    stage.innerHTML=frames[i].svg;
    narr.textContent=frames[i].narration;
    ctr.textContent='Step '+(i+1)+' / '+frames.length;
    prev.disabled=i===0;
    next.disabled=i===frames.length-1;
    dots.forEach(function(d,j){d.className='scriba-dot'+(j===i?' active':j<i?' done':'');});
  }
  prev.addEventListener('click',function(){if(cur>0)show(cur-1);});
  next.addEventListener('click',function(){if(cur<frames.length-1)show(cur+1);});
  W.addEventListener('keydown',function(e){
    if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();if(cur<frames.length-1)show(cur+1);}
    if(e.key==='ArrowLeft'){e.preventDefault();if(cur>0)show(cur-1);}
  });
  W.setAttribute('tabindex','0');
  show(0);
})();
</script>
</body>
</html>
