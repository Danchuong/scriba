<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scriba — h05_mcmf (Expected)</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  max-width: 760px;
  margin: 2rem auto;
  padding: 0 1rem;
  background: #fafafa;
  color: #212529;
}
h1 { font-size: 1.4rem; margin-bottom: 1.5rem; font-weight: 600; }

/* Widget container */
.scriba-widget {
  border: 1px solid #d0d7de;
  border-radius: 10px;
  background: #ffffff;
  overflow: hidden;
}

/* Controls bar */
.scriba-controls {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.6rem 1rem;
  background: #f6f8fa;
  border-bottom: 1px solid #d0d7de;
  user-select: none;
}
.scriba-controls button {
  background: #ffffff;
  border: 1px solid #d0d7de;
  border-radius: 6px;
  padding: 0.3rem 0.7rem;
  font-size: 0.8rem;
  cursor: pointer;
  color: #212529;
  transition: background 0.15s, border-color 0.15s;
}
.scriba-controls button:hover { background: #f0f0f0; border-color: #bbb; }
.scriba-controls button:active { background: #e4e4e4; }
.scriba-controls button:disabled { opacity: 0.35; cursor: default; }
.scriba-step-counter {
  font: 600 0.78rem ui-monospace, "SF Mono", monospace;
  color: #6c757d;
  min-width: 5rem;
  text-align: center;
}

/* Progress dots */
.scriba-progress {
  display: flex;
  gap: 4px;
  margin-left: auto;
}
.scriba-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #d0d7de;
  transition: background 0.2s;
}
.scriba-dot.active { background: #0072B2; }
.scriba-dot.done { background: #009E73; }

/* Stage */
.scriba-stage {
  padding: 1.25rem 1rem;
  display: flex;
  justify-content: center;
  min-height: 100px;
}
.scriba-stage-svg { width: 100%; height: auto; }

/* Narration */
.scriba-narration {
  padding: 0.75rem 1rem;
  font-size: 0.92rem;
  line-height: 1.55;
  color: #212529;
  border-top: 1px solid #f0f0f0;
  min-height: 2.5rem;
}

/* SVG text */
svg text {
  font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  text-anchor: middle;
  dominant-baseline: central;
}
.cap-label {
  font: 600 10px ui-monospace, monospace;
  fill: #495057;
}
.cap-label-current {
  font: 700 10px ui-monospace, monospace;
  fill: #0072B2;
}
.cap-label-done {
  font: 600 10px ui-monospace, monospace;
  fill: #009E73;
}

/* Frame transition */
.scriba-stage svg, .scriba-narration {
  transition: opacity 0.2s ease;
}

/* Theme toggle */
.theme-toggle {
  position: fixed; top: 1rem; right: 1rem;
  padding: 0.35rem 0.7rem; cursor: pointer;
  border: 1px solid #ccc; border-radius: 6px; background: white;
  font-size: 0.8rem;
}

/* Dark mode */
[data-theme="dark"] body { background: #0d1117; color: #e6edf3; }
[data-theme="dark"] .scriba-widget { background: #161b22; border-color: #30363d; }
[data-theme="dark"] .scriba-controls { background: #1c2128; border-color: #30363d; }
[data-theme="dark"] .scriba-controls button { background: #21262d; border-color: #30363d; color: #e6edf3; }
[data-theme="dark"] .scriba-controls button:hover { background: #30363d; }
[data-theme="dark"] .scriba-step-counter { color: #7d8590; }
[data-theme="dark"] .scriba-narration { color: #e6edf3; border-color: #21262d; }
[data-theme="dark"] .scriba-dot { background: #30363d; }
[data-theme="dark"] .theme-toggle { background: #21262d; color: #e6edf3; border-color: #30363d; }
</style>
</head>
<body>
<button class="theme-toggle" onclick="
  var t = document.documentElement.dataset.theme;
  document.documentElement.dataset.theme = t === 'dark' ? 'light' : 'dark';
">Toggle theme</button>
<h1>h05_mcmf &mdash; Min-Cost Max-Flow</h1>
<div class="scriba-widget" id="mcmf">
  <div class="scriba-controls">
    <button class="scriba-btn-prev" disabled>Prev</button>
    <span class="scriba-step-counter">Step 1 / 5</span>
    <button class="scriba-btn-next">Next</button>
    <div class="scriba-progress">
      <div class="scriba-dot active"></div>
      <div class="scriba-dot"></div>
      <div class="scriba-dot"></div>
      <div class="scriba-dot"></div>
      <div class="scriba-dot"></div>
    </div>
  </div>
  <div class="scriba-stage"></div>
  <p class="scriba-narration"></p>
</div>
<script>
(function(){
  // Fixed node positions (stable layout — never change between steps)
  // s=source(right), t=sink(left), a/b middle-top/bottom, c/d inner
  var NX={s:540,a:360,b:360,c:180,d:180,t:20};
  var NY={s:150,a:60,b:240,c:60,d:240,t:150};
  var R=22;
  var VB="0 0 580 310";

  // Helper: draw an edge with arrow, capacity label, optional dash
  function edge(x1,y1,x2,y2,label,state,dashed){
    var colors={idle:"#d0d7de",current:"#0072B2",done:"#009E73",good:"#56B4E9",dim:"#e8e8e8"};
    var sw={idle:1.5,current:2.5,done:2,good:2,dim:1};
    var col=colors[state]||colors.idle;
    // Shorten line so arrow doesn't overlap circle
    var dx=x2-x1, dy=y2-y1, len=Math.sqrt(dx*dx+dy*dy);
    var ux=dx/len, uy=dy/len;
    var ax1=x1+ux*(R+2), ay1=y1+uy*(R+2);
    var ax2=x2-ux*(R+6), ay2=y2-uy*(R+6);
    // Label position: midpoint offset perpendicular
    var mx=(x1+x2)/2, my=(y1+y2)/2;
    var px=-uy*14, py=ux*14;
    var lx=mx+px, ly=my+py;
    var lcls=state==="current"?"cap-label-current":state==="done"?"cap-label-done":"cap-label";
    var dash=dashed?' stroke-dasharray="6,4"':'';
    return '<line x1="'+ax1+'" y1="'+ay1+'" x2="'+ax2+'" y2="'+ay2+'" stroke="'+col+'" stroke-width="'+sw[state]+'" marker-end="url(#arr-'+state+')"'+dash+'/>'+
      (label?'<text x="'+lx+'" y="'+ly+'" class="'+lcls+'">'+label+'</text>':'');
  }

  // Helper: draw a node
  function node(id,state){
    var fills={idle:"#f6f8fa",current:"#0072B2",done:"#009E73",good:"#56B4E9",dim:"#e8e8e8"};
    var strokes={idle:"#d0d7de",current:"#005a8e",done:"#007a59",good:"#3a95c9",dim:"#ccc"};
    var textFill=(state==="idle"||state==="dim")?"#212529":"#ffffff";
    return '<circle cx="'+NX[id]+'" cy="'+NY[id]+'" r="'+R+'" fill="'+fills[state]+'" stroke="'+strokes[state]+'" stroke-width="'+(state==="idle"?1.5:2)+'"/>'+
      '<text x="'+NX[id]+'" y="'+NY[id]+'" fill="'+textFill+'">'+id+'</text>';
  }

  function markers(){
    var cols={idle:"#d0d7de",current:"#0072B2",done:"#009E73",good:"#56B4E9",dim:"#e8e8e8"};
    var s='<defs>';
    for(var k in cols){
      s+='<marker id="arr-'+k+'" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="'+cols[k]+'"/></marker>';
    }
    s+='</defs>';
    return s;
  }

  function svgWrap(inner){
    return '<svg class="scriba-stage-svg" viewBox="'+VB+'" xmlns="http://www.w3.org/2000/svg">'+
      markers()+'<g>'+inner+'</g></svg>';
  }

  // ---- EDGES: (from, to, capacity, cost) ----
  // s->a cap=3 cost=1, s->b cap=4 cost=2
  // a->c cap=2 cost=1, a->d cap=3 cost=3
  // b->c cap=1 cost=2, b->d cap=3 cost=1
  // c->t cap=3 cost=2, d->t cap=4 cost=1

  // Step 1: Initial graph, all idle, show capacities
  var f1_edges =
    edge(NX.s,NY.s,NX.a,NY.a,"0/3","idle")+
    edge(NX.s,NY.s,NX.b,NY.b,"0/4","idle")+
    edge(NX.a,NY.a,NX.c,NY.c,"0/2","idle")+
    edge(NX.a,NY.a,NX.d,NY.d,"0/3","idle")+
    edge(NX.b,NY.b,NX.c,NY.c,"0/1","idle")+
    edge(NX.b,NY.b,NX.d,NY.d,"0/3","idle")+
    edge(NX.c,NY.c,NX.t,NY.t,"0/3","idle")+
    edge(NX.d,NY.d,NX.t,NY.t,"0/4","idle");
  var f1_nodes=node("s","idle")+node("a","idle")+node("b","idle")+node("c","idle")+node("d","idle")+node("t","idle");

  // Step 2: Augmenting path s->a->c->t, flow=2, cost=1+1+2=4 per unit
  var f2_edges =
    edge(NX.s,NY.s,NX.a,NY.a,"2/3","current")+
    edge(NX.s,NY.s,NX.b,NY.b,"0/4","idle")+
    edge(NX.a,NY.a,NX.c,NY.c,"2/2","current")+
    edge(NX.a,NY.a,NX.d,NY.d,"0/3","idle")+
    edge(NX.b,NY.b,NX.c,NY.c,"0/1","idle")+
    edge(NX.b,NY.b,NX.d,NY.d,"0/3","idle")+
    edge(NX.c,NY.c,NX.t,NY.t,"2/3","current")+
    edge(NX.d,NY.d,NX.t,NY.t,"0/4","idle");
  var f2_nodes=node("s","current")+node("a","current")+node("b","idle")+node("c","current")+node("d","idle")+node("t","current");

  // Step 3: Path s->b->d->t, flow=3, residual edges appear dashed
  var f3_edges =
    edge(NX.s,NY.s,NX.a,NY.a,"2/3","done")+
    edge(NX.a,NY.a,NX.s,NY.s,"","dim",true)+ // reverse (dashed)
    edge(NX.s,NY.s,NX.b,NY.b,"3/4","current")+
    edge(NX.a,NY.a,NX.c,NY.c,"2/2","done")+
    edge(NX.c,NY.c,NX.a,NY.a,"","dim",true)+ // reverse
    edge(NX.a,NY.a,NX.d,NY.d,"0/3","idle")+
    edge(NX.b,NY.b,NX.c,NY.c,"0/1","idle")+
    edge(NX.b,NY.b,NX.d,NY.d,"3/3","current")+
    edge(NX.c,NY.c,NX.t,NY.t,"2/3","done")+
    edge(NX.t,NY.t,NX.c,NY.c,"","dim",true)+ // reverse
    edge(NX.d,NY.d,NX.t,NY.t,"3/4","current");
  var f3_nodes=node("s","current")+node("a","done")+node("b","current")+node("c","done")+node("d","current")+node("t","current");

  // Step 4: Path s->a->d->t, flow=1 (residual cap on s->a is 1)
  var f4_edges =
    edge(NX.s,NY.s,NX.a,NY.a,"3/3","current")+
    edge(NX.a,NY.a,NX.s,NY.s,"","dim",true)+
    edge(NX.s,NY.s,NX.b,NY.b,"3/4","done")+
    edge(NX.b,NY.b,NX.s,NY.s,"","dim",true)+
    edge(NX.a,NY.a,NX.c,NY.c,"2/2","done")+
    edge(NX.c,NY.c,NX.a,NY.a,"","dim",true)+
    edge(NX.a,NY.a,NX.d,NY.d,"1/3","current")+
    edge(NX.b,NY.b,NX.c,NY.c,"0/1","idle")+
    edge(NX.b,NY.b,NX.d,NY.d,"3/3","done")+
    edge(NX.d,NY.d,NX.b,NY.b,"","dim",true)+
    edge(NX.c,NY.c,NX.t,NY.t,"2/3","done")+
    edge(NX.t,NY.t,NX.c,NY.c,"","dim",true)+
    edge(NX.d,NY.d,NX.t,NY.t,"4/4","current");
  var f4_nodes=node("s","current")+node("a","current")+node("b","done")+node("c","done")+node("d","current")+node("t","current");

  // Step 5: No more augmenting paths. Max flow=6. All done.
  var f5_edges =
    edge(NX.s,NY.s,NX.a,NY.a,"3/3","good")+
    edge(NX.s,NY.s,NX.b,NY.b,"3/4","good")+
    edge(NX.a,NY.a,NX.c,NY.c,"2/2","good")+
    edge(NX.a,NY.a,NX.d,NY.d,"1/3","good")+
    edge(NX.b,NY.b,NX.c,NY.c,"0/1","dim")+
    edge(NX.b,NY.b,NX.d,NY.d,"3/3","good")+
    edge(NX.c,NY.c,NX.t,NY.t,"2/3","good")+
    edge(NX.d,NY.d,NX.t,NY.t,"4/4","good");
  var f5_nodes=node("s","good")+node("a","done")+node("b","done")+node("c","done")+node("d","done")+node("t","good");

  var frames=[
    {svg:svgWrap(f1_edges+f1_nodes),
     narration:"Do thi 6 dinh (s, a, b, c, d, t). Moi canh hien thi luong/dung luong (vi du \"0/3\"). Muc tieu: tim luong cuc dai tu s den t voi tong chi phi nho nhat (MCMF) bang SPFA."},
    {svg:svgWrap(f2_edges+f2_nodes),
     narration:"Duong tang 1: s \u2192 a \u2192 c \u2192 t. Bottleneck = min(3,2,3) = 2. Day 2 don vi luong. Chi phi don vi = 1+1+2 = 4. Tong chi phi: 2\u00d74 = 8."},
    {svg:svgWrap(f3_edges+f3_nodes),
     narration:"Cap nhat do thi thang du: canh nguoc (net dut) xuat hien. Duong tang 2: s \u2192 b \u2192 d \u2192 t. Bottleneck = min(4,3,4) = 3. Chi phi don vi = 2+1+1 = 4. Tong cong don: 8 + 12 = 20."},
    {svg:svgWrap(f4_edges+f4_nodes),
     narration:"Duong tang 3: s \u2192 a \u2192 d \u2192 t. Dung luong con lai tren s\u2192a la 1. Day 1 don vi. Chi phi = 1+3+1 = 5. Tong: 20 + 5 = 25."},
    {svg:svgWrap(f5_edges+f5_nodes),
     narration:"Khong con duong tang nao. Luong cuc dai = 6 (3+3+0 = 6 tren cac canh ra khoi s). Tong chi phi cuc tieu = 25. Canh b\u2192c khong duoc dung (dim). MCMF hoan tat!"}
  ];

  var W=document.getElementById('mcmf');
  var cur=0;
  var stage=W.querySelector('.scriba-stage');
  var narr=W.querySelector('.scriba-narration');
  var ctr=W.querySelector('.scriba-step-counter');
  var prev=W.querySelector('.scriba-btn-prev');
  var next=W.querySelector('.scriba-btn-next');
  var dots=W.querySelectorAll('.scriba-dot');
  function show(i){
    cur=i;
    stage.innerHTML=frames[i].svg;
    narr.innerHTML=frames[i].narration;
    ctr.textContent='Step '+(i+1)+' / '+frames.length;
    prev.disabled=i===0;
    next.disabled=i===frames.length-1;
    dots.forEach(function(d,j){d.className='scriba-dot'+(j===i?' active':j<i?' done':'');});
  }
  prev.addEventListener('click',function(){if(cur>0)show(cur-1);});
  next.addEventListener('click',function(){if(cur<frames.length-1)show(cur+1);});
  W.addEventListener('keydown',function(e){
    if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();if(cur<frames.length-1)show(cur+1);}
    if(e.key==='ArrowLeft'){e.preventDefault();if(cur>0)show(cur-1);}
  });
  W.setAttribute('tabindex','0');
  show(0);
})();
</script>
</body>
</html>
