<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scriba — h07_splay_amortized (Expected)</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  max-width: 960px;
  margin: 2rem auto;
  padding: 0 1rem;
  background: #fafafa;
  color: #212529;
}
h1 { font-size: 1.4rem; margin-bottom: 1.5rem; font-weight: 600; }

.scriba-widget {
  border: 1px solid #d0d7de;
  border-radius: 10px;
  background: #ffffff;
  overflow: hidden;
}
.scriba-controls {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.6rem 1rem;
  background: #f6f8fa;
  border-bottom: 1px solid #d0d7de;
  user-select: none;
}
.scriba-controls button {
  background: #ffffff;
  border: 1px solid #d0d7de;
  border-radius: 6px;
  padding: 0.3rem 0.7rem;
  font-size: 0.8rem;
  cursor: pointer;
  color: #212529;
  transition: background 0.15s, border-color 0.15s;
}
.scriba-controls button:hover { background: #f0f0f0; border-color: #bbb; }
.scriba-controls button:active { background: #e4e4e4; }
.scriba-controls button:disabled { opacity: 0.35; cursor: default; }
.scriba-step-counter {
  font: 600 0.78rem ui-monospace, "SF Mono", monospace;
  color: #6c757d;
  min-width: 5rem;
  text-align: center;
}
.scriba-progress {
  display: flex;
  gap: 4px;
  margin-left: auto;
}
.scriba-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #d0d7de;
  transition: background 0.2s;
}
.scriba-dot.active { background: #0072B2; }
.scriba-dot.done { background: #009E73; }
.scriba-stage {
  padding: 1.25rem 1rem;
  display: flex;
  justify-content: center;
  min-height: 100px;
}
.scriba-dual {
  display: flex;
  gap: 1rem;
  width: 100%;
}
.scriba-dual > div { flex: 1; min-width: 0; }
.scriba-dual svg { width: 100%; height: auto; }
.scriba-narration {
  padding: 0.75rem 1rem;
  font-size: 0.92rem;
  line-height: 1.55;
  color: #212529;
  border-top: 1px solid #f0f0f0;
  min-height: 2.5rem;
}
svg text {
  font: 700 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  text-anchor: middle;
  dominant-baseline: central;
}

.theme-toggle {
  position: fixed; top: 1rem; right: 1rem;
  padding: 0.35rem 0.7rem; cursor: pointer;
  border: 1px solid #ccc; border-radius: 6px; background: white;
  font-size: 0.8rem;
}
[data-theme="dark"] body { background: #0d1117; color: #e6edf3; }
[data-theme="dark"] .scriba-widget { background: #161b22; border-color: #30363d; }
[data-theme="dark"] .scriba-controls { background: #1c2128; border-color: #30363d; }
[data-theme="dark"] .scriba-controls button { background: #21262d; border-color: #30363d; color: #e6edf3; }
[data-theme="dark"] .scriba-controls button:hover { background: #30363d; }
[data-theme="dark"] .scriba-step-counter { color: #7d8590; }
[data-theme="dark"] .scriba-narration { color: #e6edf3; border-color: #21262d; }
[data-theme="dark"] .scriba-dot { background: #30363d; }
[data-theme="dark"] .theme-toggle { background: #21262d; color: #e6edf3; border-color: #30363d; }
</style>
</head>
<body>
<button class="theme-toggle" onclick="
  var t = document.documentElement.dataset.theme;
  document.documentElement.dataset.theme = t === 'dark' ? 'light' : 'dark';
">Toggle theme</button>
<h1>h07_splay_amortized &mdash; Splay Tree Amortized Analysis</h1>
<div class="scriba-widget" id="splay">
  <div class="scriba-controls">
    <button class="scriba-btn-prev" disabled>Prev</button>
    <span class="scriba-step-counter">Step 1 / 9</span>
    <button class="scriba-btn-next">Next</button>
    <div class="scriba-progress">
      <div class="scriba-dot active"></div>
      <div class="scriba-dot"></div>
      <div class="scriba-dot"></div>
      <div class="scriba-dot"></div>
      <div class="scriba-dot"></div>
      <div class="scriba-dot"></div>
      <div class="scriba-dot"></div>
      <div class="scriba-dot"></div>
      <div class="scriba-dot"></div>
    </div>
  </div>
  <div class="scriba-stage"></div>
  <p class="scriba-narration"></p>
</div>
<script>
(function(){
  var R=16; // node radius
  var treeW=420, treeH=300;
  var chartW=420, chartH=300;

  var colors={
    idle:{fill:"#f6f8fa",stroke:"#d0d7de",text:"#212529"},
    current:{fill:"#0072B2",stroke:"#005a8e",text:"#ffffff"},
    done:{fill:"#009E73",stroke:"#007a59",text:"#ffffff"},
    good:{fill:"#56B4E9",stroke:"#3a95c9",text:"#ffffff"}
  };

  function treeNode(x,y,val,state){
    var c=colors[state]||colors.idle;
    return '<circle cx="'+x+'" cy="'+y+'" r="'+R+'" fill="'+c.fill+'" stroke="'+c.stroke+'" stroke-width="'+(state==="idle"?1.5:2)+'"/>'+
      '<text x="'+x+'" y="'+y+'" fill="'+c.text+'" style="font-size:11px">'+val+'</text>';
  }

  function treeEdge(x1,y1,x2,y2){
    return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="#d0d7de" stroke-width="1.5"/>';
  }

  // Build a tree SVG from a structure: {val, state, x, y, left?, right?}
  function renderTree(root){
    var edges='', nodes='';
    function walk(n){
      if(!n) return;
      if(n.left){
        edges+=treeEdge(n.x,n.y+R,n.left.x,n.left.y-R);
        walk(n.left);
      }
      if(n.right){
        edges+=treeEdge(n.x,n.y+R,n.right.x,n.right.y-R);
        walk(n.right);
      }
      nodes+=treeNode(n.x,n.y,n.val,n.state||"idle");
    }
    walk(root);
    return '<svg viewBox="0 0 '+treeW+' '+treeH+'" xmlns="http://www.w3.org/2000/svg">'+
      '<text x="'+treeW/2+'" y="14" style="font:600 11px sans-serif;fill:#6c757d" text-anchor="middle">Splay Tree</text>'+
      edges+nodes+'</svg>';
  }

  // MetricPlot: line chart with phi and cost series
  // data: [{step, phi, cost}]
  function renderChart(data, activeStep){
    var pad={l:45,r:15,t:25,b:30};
    var pw=chartW-pad.l-pad.r, ph=chartH-pad.t-pad.b;
    var maxStep=9, maxY=20;
    function cx(s){ return pad.l+(s-1)/(maxStep-1)*pw; }
    function cy(v){ return pad.t+(1-v/maxY)*ph; }

    var s='<svg viewBox="0 0 '+chartW+' '+chartH+'" xmlns="http://www.w3.org/2000/svg">';
    s+='<text x="'+chartW/2+'" y="14" style="font:600 11px sans-serif;fill:#6c757d" text-anchor="middle">Amortized Analysis</text>';

    // Grid
    for(var i=1;i<=maxStep;i++){
      s+='<line x1="'+cx(i)+'" y1="'+cy(0)+'" x2="'+cx(i)+'" y2="'+cy(maxY)+'" stroke="#eee" stroke-width="0.5"/>';
      s+='<text x="'+cx(i)+'" y="'+(cy(0)+14)+'" style="font:400 9px ui-monospace,monospace;fill:#999" text-anchor="middle">'+i+'</text>';
    }
    for(var v=0;v<=maxY;v+=5){
      s+='<line x1="'+pad.l+'" y1="'+cy(v)+'" x2="'+(chartW-pad.r)+'" y2="'+cy(v)+'" stroke="#eee" stroke-width="0.5"/>';
      s+='<text x="'+(pad.l-6)+'" y="'+cy(v)+'" style="font:400 9px ui-monospace,monospace;fill:#999" text-anchor="end" dominant-baseline="central">'+v+'</text>';
    }

    // Axes
    s+='<line x1="'+pad.l+'" y1="'+cy(0)+'" x2="'+(chartW-pad.r)+'" y2="'+cy(0)+'" stroke="#495057" stroke-width="1.5"/>';
    s+='<line x1="'+pad.l+'" y1="'+cy(0)+'" x2="'+pad.l+'" y2="'+cy(maxY)+'" stroke="#495057" stroke-width="1.5"/>';
    s+='<text x="'+chartW/2+'" y="'+(cy(0)+26)+'" style="font:500 10px sans-serif;fill:#495057" text-anchor="middle">Buoc</text>';

    // Current step marker (vertical line)
    if(activeStep>=1){
      s+='<line x1="'+cx(activeStep)+'" y1="'+cy(0)+'" x2="'+cx(activeStep)+'" y2="'+cy(maxY)+'" stroke="#0072B2" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>';
    }

    // Draw phi series (blue)
    if(data.length>1){
      var d='M';
      for(var i=0;i<data.length;i++){
        d+=(i>0?' L ':'')+cx(data[i].step)+' '+cy(data[i].phi);
      }
      s+='<path d="'+d+'" fill="none" stroke="#0072B2" stroke-width="2" stroke-linejoin="round"/>';
    }
    for(var i=0;i<data.length;i++){
      s+='<circle cx="'+cx(data[i].step)+'" cy="'+cy(data[i].phi)+'" r="3.5" fill="#0072B2" stroke="white" stroke-width="1.5"/>';
    }

    // Draw cost series (vermillion)
    if(data.length>1){
      var d='M';
      for(var i=0;i<data.length;i++){
        d+=(i>0?' L ':'')+cx(data[i].step)+' '+cy(data[i].cost);
      }
      s+='<path d="'+d+'" fill="none" stroke="#D55E00" stroke-width="2" stroke-linejoin="round"/>';
    }
    for(var i=0;i<data.length;i++){
      s+='<circle cx="'+cx(data[i].step)+'" cy="'+cy(data[i].cost)+'" r="3.5" fill="#D55E00" stroke="white" stroke-width="1.5"/>';
    }

    // Legend
    s+='<rect x="'+(chartW-pad.r-120)+'" y="'+(pad.t+5)+'" width="110" height="36" rx="4" fill="white" stroke="#d0d7de" stroke-width="0.5" opacity="0.9"/>';
    s+='<line x1="'+(chartW-pad.r-112)+'" y1="'+(pad.t+17)+'" x2="'+(chartW-pad.r-96)+'" y2="'+(pad.t+17)+'" stroke="#0072B2" stroke-width="2"/>';
    s+='<text x="'+(chartW-pad.r-90)+'" y="'+(pad.t+17)+'" style="font:500 9px sans-serif;fill:#333" text-anchor="start" dominant-baseline="central">\u03A6 (potential)</text>';
    s+='<line x1="'+(chartW-pad.r-112)+'" y1="'+(pad.t+31)+'" x2="'+(chartW-pad.r-96)+'" y2="'+(pad.t+31)+'" stroke="#D55E00" stroke-width="2"/>';
    s+='<text x="'+(chartW-pad.r-90)+'" y="'+(pad.t+31)+'" style="font:500 9px sans-serif;fill:#333" text-anchor="start" dominant-baseline="central">Cost (actual)</text>';

    s+='</svg>';
    return s;
  }

  // Tree shapes for each step (7 nodes: 1-7)
  // Step 1: Initial degenerate tree (right-skewed chain: 1->2->3->4->5->6->7)
  var trees=[];

  // Helper: position nodes in a balanced-ish layout
  // Step 1: chain 1-2-3-4-5-6-7 (degenerate)
  trees[0]={val:1,x:60,y:40,state:"idle",right:{val:2,x:110,y:80,state:"idle",right:{val:3,x:160,y:120,state:"idle",right:{val:4,x:210,y:160,state:"idle",right:{val:5,x:260,y:200,state:"idle",right:{val:6,x:310,y:240,state:"idle",right:{val:7,x:360,y:280,state:"idle"}}}}}}};

  // Step 2: Access 4 → splay 4 to root. Tree becomes: 4 at root, left subtree has 1,2,3, right has 5,6,7
  trees[1]={val:4,x:210,y:40,state:"current",
    left:{val:2,x:110,y:110,state:"idle",
      left:{val:1,x:60,y:180,state:"idle"},
      right:{val:3,x:160,y:180,state:"idle"}},
    right:{val:6,x:310,y:110,state:"idle",
      left:{val:5,x:260,y:180,state:"idle"},
      right:{val:7,x:360,y:180,state:"idle"}}
  };

  // Step 3: Access 1 → splay 1 to root
  trees[2]={val:1,x:210,y:40,state:"current",
    right:{val:4,x:310,y:110,state:"idle",
      left:{val:2,x:240,y:180,state:"idle",
        right:{val:3,x:280,y:240,state:"idle"}},
      right:{val:6,x:370,y:180,state:"idle",
        left:{val:5,x:340,y:240,state:"idle"},
        right:{val:7,x:400,y:240,state:"idle"}}}
  };

  // Step 4: Access 7 → splay 7 to root
  trees[3]={val:7,x:210,y:40,state:"current",
    left:{val:4,x:120,y:110,state:"idle",
      left:{val:1,x:60,y:180,state:"idle",
        right:{val:2,x:90,y:240,state:"idle",
          right:{val:3,x:120,y:280,state:"idle"}}},
      right:{val:6,x:170,y:180,state:"idle",
        left:{val:5,x:150,y:240,state:"idle"}}}
  };

  // Step 5: Access 3 → splay 3 to root
  trees[4]={val:3,x:210,y:40,state:"current",
    left:{val:2,x:120,y:110,state:"idle",
      left:{val:1,x:70,y:180,state:"idle"}},
    right:{val:7,x:310,y:110,state:"idle",
      left:{val:4,x:260,y:180,state:"idle",
        right:{val:6,x:300,y:240,state:"idle",
          left:{val:5,x:270,y:280,state:"idle"}}}}
  };

  // Step 6: Access 5 → splay 5 to root
  trees[5]={val:5,x:210,y:40,state:"current",
    left:{val:3,x:110,y:110,state:"idle",
      left:{val:2,x:60,y:180,state:"idle",
        left:{val:1,x:40,y:240,state:"idle"}},
      right:{val:4,x:160,y:180,state:"idle"}},
    right:{val:7,x:310,y:110,state:"idle",
      left:{val:6,x:270,y:180,state:"idle"}}
  };

  // Step 7: Access 2 → splay 2 to root
  trees[6]={val:2,x:210,y:40,state:"current",
    left:{val:1,x:110,y:110,state:"idle"},
    right:{val:5,x:310,y:110,state:"idle",
      left:{val:3,x:250,y:180,state:"idle",
        right:{val:4,x:280,y:240,state:"idle"}},
      right:{val:7,x:370,y:180,state:"idle",
        left:{val:6,x:340,y:240,state:"idle"}}}
  };

  // Step 8: Access 6 → splay 6 to root
  trees[7]={val:6,x:210,y:40,state:"current",
    left:{val:2,x:110,y:110,state:"idle",
      left:{val:1,x:60,y:180,state:"idle"},
      right:{val:5,x:170,y:180,state:"idle",
        left:{val:3,x:140,y:240,state:"idle",
          right:{val:4,x:170,y:280,state:"idle"}}}},
    right:{val:7,x:310,y:110,state:"idle"}
  };

  // Step 9: Final — show all done
  trees[8]={val:6,x:210,y:40,state:"done",
    left:{val:2,x:110,y:110,state:"done",
      left:{val:1,x:60,y:180,state:"done"},
      right:{val:5,x:170,y:180,state:"done",
        left:{val:3,x:140,y:240,state:"done",
          right:{val:4,x:170,y:280,state:"done"}}}},
    right:{val:7,x:310,y:110,state:"done"}
  };

  // Amortized data: phi (potential) and cost (actual splay cost = depth of accessed node)
  // Phi = sum of log2(subtree_size) for all nodes. Simulated realistic values.
  var chartData=[
    [{step:1, phi:14.0, cost:0}],  // initial, no operation
    [{step:1,phi:14.0,cost:0},{step:2,phi:8.6,cost:6}],  // access 4: depth=3 in chain of 7
    [{step:1,phi:14.0,cost:0},{step:2,phi:8.6,cost:6},{step:3,phi:11.2,cost:3}],
    [{step:1,phi:14.0,cost:0},{step:2,phi:8.6,cost:6},{step:3,phi:11.2,cost:3},{step:4,phi:12.8,cost:5}],
    [{step:1,phi:14.0,cost:0},{step:2,phi:8.6,cost:6},{step:3,phi:11.2,cost:3},{step:4,phi:12.8,cost:5},{step:5,phi:9.4,cost:4}],
    [{step:1,phi:14.0,cost:0},{step:2,phi:8.6,cost:6},{step:3,phi:11.2,cost:3},{step:4,phi:12.8,cost:5},{step:5,phi:9.4,cost:4},{step:6,phi:8.2,cost:3}],
    [{step:1,phi:14.0,cost:0},{step:2,phi:8.6,cost:6},{step:3,phi:11.2,cost:3},{step:4,phi:12.8,cost:5},{step:5,phi:9.4,cost:4},{step:6,phi:8.2,cost:3},{step:7,phi:10.5,cost:2}],
    [{step:1,phi:14.0,cost:0},{step:2,phi:8.6,cost:6},{step:3,phi:11.2,cost:3},{step:4,phi:12.8,cost:5},{step:5,phi:9.4,cost:4},{step:6,phi:8.2,cost:3},{step:7,phi:10.5,cost:2},{step:8,phi:9.8,cost:4}],
    [{step:1,phi:14.0,cost:0},{step:2,phi:8.6,cost:6},{step:3,phi:11.2,cost:3},{step:4,phi:12.8,cost:5},{step:5,phi:9.4,cost:4},{step:6,phi:8.2,cost:3},{step:7,phi:10.5,cost:2},{step:8,phi:9.8,cost:4},{step:9,phi:9.8,cost:0}]
  ];

  var narrations=[
    "Cay splay ban dau: 7 nut (1\u20137) xep thanh chuoi suy bien (degenerate chain). \u03A6 = \u2211 log\u2082(kich thuoc cay con) = 14.0. Chua co thao tac nao.",
    "Truy cap nut 4: splay dua 4 len goc. Chi phi thuc = 6 (do sau 4 trong chuoi). Cay can bang hon. \u03A6 giam manh tu 14.0 xuong 8.6 \u2014 \u0394\u03A6 am bu chi phi cao.",
    "Truy cap nut 1: splay dua 1 len goc. Chi phi = 3. \u03A6 tang len 11.2 vi cay lech phai. Chi phi khau hao = cost + \u0394\u03A6 van hop ly.",
    "Truy cap nut 7: splay dua 7 len goc. Chi phi = 5 (nut 7 o sau). \u03A6 tang len 12.8. Cay bi keo sang trai.",
    "Truy cap nut 3: chi phi = 4. Sau splay, cay can bang hon. \u03A6 giam xuong 9.4. Xu huong: thao tac dat lam \u03A6 giam, nen cac thao tac sau re hon.",
    "Truy cap nut 5: chi phi = 3. \u03A6 tiep tuc giam (8.2). Cay dang dan can bang nho splay lien tuc.",
    "Truy cap nut 2: chi phi = 2 (nut gan goc). \u03A6 tang nhe len 10.5. Chi phi thap vi cay da kha can bang.",
    "Truy cap nut 6: chi phi = 4. \u03A6 = 9.8. Bieu do cho thay: khi cost tang thi phi giam, va nguoc lai. Day la ban chat cua phan tich khau hao.",
    "Ket thuc. Tong 8 thao tac tren cay 7 nut. Chi phi khau hao trung binh = O(log n) = O(2.81). Bieu do minh hoa: chuoi cost (cam) nhay len xuong, nhung phi (xanh) bu tru \u2014 dam bao amortized O(log n) moi thao tac."
  ];

  var frames=[];
  for(var i=0;i<9;i++){
    frames.push({
      tree: renderTree(trees[i]),
      chart: renderChart(chartData[i], i+1),
      narration: narrations[i]
    });
  }

  var W=document.getElementById('splay');
  var cur=0;
  var stage=W.querySelector('.scriba-stage');
  var narr=W.querySelector('.scriba-narration');
  var ctr=W.querySelector('.scriba-step-counter');
  var prev=W.querySelector('.scriba-btn-prev');
  var next=W.querySelector('.scriba-btn-next');
  var dots=W.querySelectorAll('.scriba-dot');

  function show(i){
    cur=i;
    stage.innerHTML='<div class="scriba-dual"><div>'+frames[i].tree+'</div><div>'+frames[i].chart+'</div></div>';
    narr.innerHTML=frames[i].narration;
    ctr.textContent='Step '+(i+1)+' / '+frames.length;
    prev.disabled=i===0;
    next.disabled=i===frames.length-1;
    dots.forEach(function(d,j){d.className='scriba-dot'+(j===i?' active':j<i?' done':'');});
  }
  prev.addEventListener('click',function(){if(cur>0)show(cur-1);});
  next.addEventListener('click',function(){if(cur<frames.length-1)show(cur+1);});
  W.addEventListener('keydown',function(e){
    if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();if(cur<frames.length-1)show(cur+1);}
    if(e.key==='ArrowLeft'){e.preventDefault();if(cur>0)show(cur-1);}
  });
  W.setAttribute('tabindex','0');
  show(0);
})();
</script>
</body>
</html>
