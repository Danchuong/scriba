<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scriba — Knuth DP Optimization (Expected)</title>
<style>
/* ── Reset & Base ─────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:"Inter","SF Pro Text",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:#13131a;color:#e0e0e8;
  max-width:780px;margin:0 auto;padding:1.5rem 1rem 3rem;
  line-height:1.55;
}

/* ── Wong CVD-safe palette ────────────────────────── */
:root{
  --idle:    #f6f8fa;
  --current: #0072B2;
  --done:    #009E73;
  --error:   #D55E00;
  --good:    #56B4E9;
  --dim:     #e8e8e8;
  --bg-widget: #1e1e2e;
  --bg-svg:    #252536;
  --border:    #35354a;
  --text:      #e0e0e8;
  --text-dim:  #8888a0;
}

h1{
  font-size:1.35rem;font-weight:700;
  margin-bottom:1.2rem;
  background:linear-gradient(135deg,var(--good),var(--current));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:-0.02em;
}

/* ── Widget chrome ────────────────────────────────── */
.widget{
  background:var(--bg-widget);
  border:1px solid var(--border);
  border-radius:12px;overflow:hidden;
}
.controls{
  display:flex;align-items:center;gap:.7rem;
  padding:.55rem 1rem;
  background:#1a1a28;border-bottom:1px solid var(--border);
  user-select:none;
}
.controls button{
  background:#2a2a3e;border:1px solid var(--border);
  border-radius:6px;padding:.3rem .75rem;
  font-size:.78rem;color:var(--text);cursor:pointer;
  transition:background .15s,border-color .15s;
}
.controls button:hover{background:#35354a;border-color:#555}
.controls button:active{background:#444}
.controls button:disabled{opacity:.3;cursor:default}
.step-label{font-size:.78rem;color:var(--text-dim);margin-left:auto}

.canvas{padding:1.2rem;min-height:380px;position:relative}
.step{display:none}
.step.active{display:block}

.narration{
  padding:.9rem 1.2rem;
  border-top:1px solid var(--border);
  font-size:.85rem;color:var(--text-dim);
  line-height:1.6;
}
.narration strong{color:var(--good)}

/* ── SVG helpers ──────────────────────────────────── */
svg text{font-family:inherit}
.cell-idle{fill:#2a2a3e;stroke:var(--border);stroke-width:1}
.cell-current{fill:var(--current);stroke:var(--current);stroke-width:1.5}
.cell-done{fill:var(--done);stroke:var(--done);stroke-width:1.5}
.cell-good{fill:var(--good);stroke:var(--good);stroke-width:1.5}
.cell-dim{fill:#1e1e2e;stroke:var(--border);stroke-width:1}
.label{fill:var(--text);font-size:11px;text-anchor:middle;dominant-baseline:central}
.label-dim{fill:var(--text-dim);font-size:10px;text-anchor:middle;dominant-baseline:central}
.val{fill:#fff;font-size:11px;font-weight:700;text-anchor:middle;dominant-baseline:central}
.opt-val{fill:#ffd700;font-size:9px;text-anchor:middle;dominant-baseline:central}
/* NumberLine */
.nl-tick{stroke:var(--border);stroke-width:1}
.nl-dot-idle{fill:#2a2a3e;stroke:var(--border);stroke-width:1.5}
.nl-dot-active{fill:var(--current);stroke:var(--current);stroke-width:2}
.nl-dot-done{fill:var(--done);stroke:var(--done);stroke-width:1.5}
.nl-range{fill:var(--current);opacity:.15}

@media(max-width:500px){
  body{padding:1rem .5rem 2rem}
  .canvas{padding:.8rem}
  h1{font-size:1.15rem}
}
</style>
</head>
<body>

        <text x="30" y="56" class="label-dim" font-size="10">Bat bien: opt[i][j-1] &lt;= opt[i][j] &lt;= opt[i+1][j]</text>

        <!-- Empty DP table 6x6 -->
        <text x="30" y="82" class="label-dim">Bang dp[i][j] (6x6):</text>
        <g transform="translate(30,90)">
          <text x="20" y="-5" class="label-dim">0</text>
          <text x="56" y="-5" class="label-dim">1</text>
          <text x="92" y="-5" class="label-dim">2</text>
          <text x="128" y="-5" class="label-dim">3</text>
          <text x="164" y="-5" class="label-dim">4</text>
          <text x="200" y="-5" class="label-dim">5</text>
          <text x="-8" y="20" class="label-dim">0</text>
          <text x="-8" y="56" class="label-dim">1</text>
          <text x="-8" y="92" class="label-dim">2</text>

          <!-- 6 rows x 6 cols empty -->

          <rect x="36"  y="0"   width="36" height="36" rx="3" class="cell-idle" opacity=".2"/>
          <rect x="72"  y="0"   width="36" height="36" rx="3" class="cell-idle" opacity=".2"/>
          <rect x="108" y="0"   width="36" height="36" rx="3" class="cell-idle" opacity=".2"/>
          <rect x="144" y="0"   width="36" height="36" rx="3" class="cell-idle" opacity=".2"/>

          <rect x="144" y="72"  width="36" height="36" rx="3" class="cell-idle" opacity=".2"/>
          <rect x="180" y="72"  width="36" height="36" rx="3" class="cell-idle" opacity=".2"/>

          <rect x="0"   y="108" width="36" height="36" rx="3" class="cell-dim"/>
          <rect x="36"  y="108" width="36" height="36" rx="3" class="cell-dim"/>
          <rect x="72"  y="108" width="36" height="36" rx="3" class="cell-dim"/>

          <rect x="0"   y="144" width="36" height="36" rx="3" class="cell-dim"/>
          <rect x="36"  y="144" width="36" height="36" rx="3" class="cell-dim"/>

        <!-- NumberLine -->

    <!-- ============ STEP 2 ============ -->

          <rect x="180" y="0" width="36" height="36" rx="3" class="cell-idle" opacity=".2"/>

          <!-- Row 1 -->

<script>
const NARRATIONS = [
  '<strong>Buoc 1:</strong> Gioi thieu toi uu Knuth. Voi bai toan DP khoang (dp[i][j] = min cost, opt[i][j] = diem chia toi uu), tinh don dieu cua opt cho phep giam do phuc tap tu O(n^3) xuong O(n^2). Bat bien: opt[i][j-1] &lt;= opt[i][j] &lt;= opt[i+1][j].',
  '<strong>Buoc 2:</strong> Dien duong cheo do dai 0 (dp[i][i]=0) va do dai 1 (dp[i][i+1]). Moi o chua 2 gia tri: dp (chi phi, mau trang) va opt (diem chia toi uu, mau vang). Vi du dp[0][1]=4 voi opt=1.',
  '<strong>Buoc 3:</strong> Tinh dp[0][2]. Thay vi duyet k tu 0 den 2, chi can duyet tu opt[0][1]=1 den opt[1][2]=2. Chi 2 gia tri! Ket qua dp[0][2]=12, opt[0][2]=1. <strong>NumberLine</strong> cho thay pham vi bi thu hep.',
  '<strong>Buoc 4:</strong> Tinh dp[1][3]. Rang buoc: opt[1][2]=2 &lt;= k &lt;= opt[2][3]=3. Ket qua dp[1][3]=15, opt[1][3]=2. Nhan thay opt tang don dieu khi di sang phai tren cung hang — day la yeu to then chot cua toi uu Knuth.',
  '<strong>Buoc 5:</strong> Tiep tuc dien bang. Tren moi hang, cac gia tri opt tang dan (hoac giu nguyen). Dieu nay dam bao tong so phep so sanh tren moi duong cheo la O(n), nen toan bo bang la O(n^2).',
  '<strong>Buoc 6:</strong> Bang DP hoan chinh. Ket qua cuoi cung: dp[0][5] = <strong>42</strong>. Toi uu Knuth da giam thoi gian tu O(n^3) xuong O(n^2) bang cach khai thac tinh don dieu cua diem chia toi uu.'
];

let step = 0;
const total = NARRATIONS.length;
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const label = document.getElementById('stepLabel');
const narration = document.getElementById('narration');

function render() {
  document.querySelectorAll('.step').forEach((el, i) => {
    el.classList.toggle('active', i === step);
  });
  narration.innerHTML = NARRATIONS[step];
  label.textContent = `Step ${step + 1} / ${total}`;
  prevBtn.disabled = step === 0;
  nextBtn.disabled = step === total - 1;
}
prevBtn.addEventListener('click', () => { if (step > 0) { step--; render(); } });
nextBtn.addEventListener('click', () => { if (step < total - 1) { step++; render(); } });
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') prevBtn.click();
  if (e.key === 'ArrowRight') nextBtn.click();
});
</script>
</body>
