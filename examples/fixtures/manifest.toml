# Fixture manifest: per-file intent, bug class, and (for expected-fail) pinned
# error code. `build.sh --fixtures` reads this to classify outcomes.
#
# Schema:
#   [pass.<stem>]           stem = filename without .tex
#   description = "..."
#   bug_class   = "..."
#
#   [expected_fail.<stem>]
#   description = "..."
#   error_code  = "..."     # token expected in stderr / raised error
#
# Keep alphabetical by stem inside each table.

