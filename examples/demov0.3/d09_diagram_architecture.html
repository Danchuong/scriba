<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scriba — d09_diagram_architecture</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  max-width: 720px;
  margin: 2rem auto;
  padding: 0 1rem;
  background: #fafafa;
  color: #212529;
}
h1 { font-size: 1.4rem; margin-bottom: 1.5rem; font-weight: 600; }

/* Widget container */
.scriba-widget {
  border: 1px solid #d0d7de;
  border-radius: 10px;
  background: #ffffff;
  overflow: hidden;
}

/* Controls bar */
.scriba-controls {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.6rem 1rem;
  background: #f6f8fa;
  border-bottom: 1px solid #d0d7de;
  user-select: none;
}
.scriba-controls button {
  background: #ffffff;
  border: 1px solid #d0d7de;
  border-radius: 6px;
  padding: 0.3rem 0.7rem;
  font-size: 0.8rem;
  cursor: pointer;
  color: #212529;
  transition: background 0.15s, border-color 0.15s;
}
.scriba-controls button:hover { background: #f0f0f0; border-color: #bbb; }
.scriba-controls button:active { background: #e4e4e4; }
.scriba-controls button:disabled { opacity: 0.35; cursor: default; }
.scriba-step-counter {
  font: 600 0.78rem ui-monospace, "SF Mono", monospace;
  color: #6c757d;
  min-width: 5rem;
  text-align: center;
}

/* Progress dots */
.scriba-progress {
  display: flex;
  gap: 4px;
  margin-left: auto;
}
.scriba-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #d0d7de;
  transition: background 0.2s;
}
.scriba-dot.active { background: #0072B2; }
.scriba-dot.done { background: #009E73; }

/* Stage */
.scriba-stage {
  padding: 1.25rem 1rem;
  display: flex;
  justify-content: center;
  min-height: 100px;
}
.scriba-stage-svg { width: 100%; height: auto; }

/* Narration */
.scriba-narration {
  padding: 0.75rem 1rem;
  font-size: 0.92rem;
  line-height: 1.55;
  color: #212529;
  border-top: 1px solid #f0f0f0;
  min-height: 2.5rem;
}

/* SVG text positioning.
 *
 * Font FAMILY is set per-primitive (e.g. CodePanel uses monospace,
 * Graph uses sans-serif) so no global ``font`` rule appears below. But
 * text-anchor and dominant-baseline are positioning attributes, not font
 * attributes — we DO set them globally so cells styled via CSS match
 * cells styled inline (Stack/Queue/HashMap/LinkedList/Matrix already
 * emit ``style="text-anchor:middle;dominant-baseline:central"`` per element).
 *
 * Before Wave 8, the standalone ``render.py`` HTML template had zero
 * text-anchor rules. Every Array/Grid/DPTable cell value, index label,
 * and caption emitted by the CSS-only path fell through to the SVG
 * defaults (``text-anchor: start, dominant-baseline: alphabetic``) so
 * text inside rects drifted right and high. See Wave 8 centering audit. */
[data-primitive] [data-target] > text {
  text-anchor:       middle;
  dominant-baseline: central;
}
.scriba-index-label,
.idx {
  font:              500 10px ui-monospace, monospace;
  fill:              #6c757d;
  text-anchor:       middle;
  dominant-baseline: hanging;
}
.scriba-primitive-label {
  text-anchor:       middle;
  dominant-baseline: central;
}

/* Halo tokens — mirror of the --scriba-state-*-fill variables in
   scriba-scene-primitives.css. Defined on :root so the halo rules below
   can reference them via var(). ``test_css_font_sync.py`` enforces parity
   between the two files. */
:root {
  --scriba-bg:                     #ffffff;
  --scriba-state-idle-fill:        #f6f8fa;
  --scriba-state-current-fill:     #0072B2;
  --scriba-state-done-fill:        #009E73;
  --scriba-state-dim-fill:         #e9ecef;
  --scriba-state-error-fill:       #D55E00;
  --scriba-state-good-fill:        #56B4E9;
  --scriba-state-highlight-fill:   #F0E442;
  --scriba-state-path-fill:        #dbeafe;
}

/* Text halo — paint-order: stroke fill draws the stroke as a halo BEHIND
   the fill, so glyphs that overflow their container (e.g. segtree node
   labels like "[0,3]=11" inside a 22-pixel-radius circle) stay readable
   in the surrounding whitespace. The halo color matches the container
   state fill when the text is inside a stateful container, and matches
   the page background for floating labels. See Wave 9 research.
   Wrapped in ``@media (forced-colors: none)`` so Windows High Contrast
   mode can strip the halo cleanly. */
@media (forced-colors: none) {
  [data-primitive] text {
    paint-order:     stroke fill markers;
    stroke:          var(--scriba-halo, var(--scriba-bg));
    stroke-width:    3;
    stroke-linejoin: round;
    stroke-linecap:  round;
  }

  .scriba-state-idle      > text { --scriba-halo: var(--scriba-state-idle-fill); }
  .scriba-state-current   > text { --scriba-halo: var(--scriba-state-current-fill); }
  .scriba-state-done      > text { --scriba-halo: var(--scriba-state-done-fill); }
  .scriba-state-dim       > text { --scriba-halo: var(--scriba-state-dim-fill); }
  .scriba-state-error     > text { --scriba-halo: var(--scriba-state-error-fill); }
  .scriba-state-good      > text { --scriba-halo: var(--scriba-state-good-fill); }
  .scriba-state-highlight > text { --scriba-halo: var(--scriba-state-highlight-fill); }
  .scriba-state-path      > text { --scriba-halo: var(--scriba-state-path-fill); }

  .scriba-index-label,
  .idx,
  .scriba-primitive-label,
  .scriba-graph-weight {
    --scriba-halo: var(--scriba-bg);
    stroke-width:  2;
  }

  .scriba-tree-nodes text,
  .scriba-graph-nodes text {
    stroke-width: 4;
  }
}

/* Frame transition */
.scriba-stage svg, .scriba-narration {
  transition: opacity 0.2s ease;
}

/* Static filmstrip layout (legacy) */
.scriba-animation { max-width: 100%; }
.scriba-frames {
  list-style: none;
  display: flex;
  gap: 1.5rem;
  overflow-x: auto;
  padding: 1rem 0;
  scroll-snap-type: x mandatory;
}
.scriba-frame {
  flex: 0 0 auto;
  min-width: 280px;
  max-width: 560px;
  border: 1px solid #d0d7de;
  border-radius: 8px;
  background: #ffffff;
  scroll-snap-align: start;
  overflow: hidden;
}
.scriba-frame-header {
  padding: 0.5rem 1rem;
  background: #f6f8fa;
  border-bottom: 1px solid #d0d7de;
}
.scriba-step-label {
  font: 600 0.72rem ui-monospace, monospace;
  color: #6c757d;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

/* Theme toggle */
.theme-toggle {
  position: fixed; top: 1rem; right: 1rem;
  padding: 0.35rem 0.7rem; cursor: pointer;
  border: 1px solid #ccc; border-radius: 6px; background: white;
  font-size: 0.8rem;
}

/* Dark mode */
[data-theme="dark"] {
  /* Halo variables flip with the theme via the cascade so every
     primitive text element picks up a dark-appropriate outline
     without any JS or Python work. Wave 9. */
  --scriba-bg:                   #0d1117;
  --scriba-state-idle-fill:      #161b22;
  --scriba-state-dim-fill:       #21262d;
}
[data-theme="dark"] body { background: #0d1117; color: #e6edf3; }
[data-theme="dark"] .scriba-widget { background: #161b22; border-color: #30363d; }
[data-theme="dark"] .scriba-controls { background: #1c2128; border-color: #30363d; }
[data-theme="dark"] .scriba-controls button { background: #21262d; border-color: #30363d; color: #e6edf3; }
[data-theme="dark"] .scriba-controls button:hover { background: #30363d; }
[data-theme="dark"] .scriba-step-counter { color: #7d8590; }
[data-theme="dark"] .scriba-narration { color: #e6edf3; border-color: #21262d; }
[data-theme="dark"] .scriba-dot { background: #30363d; }
[data-theme="dark"] .idx { fill: #7d8590; }
[data-theme="dark"] .scriba-frame { background: #161b22; border-color: #30363d; }
[data-theme="dark"] .scriba-frame-header { background: #1c2128; border-color: #30363d; }
[data-theme="dark"] .scriba-step-label { color: #7d8590; }
[data-theme="dark"] .theme-toggle { background: #21262d; color: #e6edf3; border-color: #30363d; }
</style>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.css">
