<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scriba — demo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  max-width: 960px;
  margin: 2rem auto;
  padding: 0 1rem;
  background: #fafafa;
  color: #212529;
}
h1 { font-size: 1.5rem; margin-bottom: 1.5rem; }
.theme-toggle {
  position: fixed; top: 1rem; right: 1rem;
  padding: 0.4rem 0.8rem; cursor: pointer;
  border: 1px solid #ccc; border-radius: 4px; background: white;
}
/* Scriba Scene Primitives
 * Shared base styles for SVG primitives used by AnimationRenderer and
 * DiagramRenderer.  State classes, primitive geometry, annotation styles,
 * and all --scriba-state-* custom properties live here.
 *
 * Uses --scriba-* CSS variables.  Base tokens (--scriba-fg, --scriba-bg,
 * --scriba-border, etc.) are defined in scriba-tex-content.css and are
 * referenced — never redefined — by this file.
 *
 * Wong CVD-safe palette: colors are distinguishable under protanopia,
 * deuteranopia, and tritanopia.
 */

/* ============================================
   Scene-level tokens
   ============================================ */

:root {
  /* Base tokens — fallbacks when scriba-tex-content.css is not loaded */
  --scriba-fg:                     #212529;
  --scriba-fg-muted:               #6c757d;
  --scriba-bg:                     #ffffff;
  --scriba-bg-code:                #f6f8fa;
  --scriba-border:                 #d0d7de;
  --scriba-link:                   #0969da;
  --scriba-radius:                 6px;

  /* Frame layout */
  --scriba-frame-gap:              1rem;
  --scriba-frame-padding:          1rem;
  --scriba-frame-border:           1px solid var(--scriba-border);
  --scriba-frame-radius:           var(--scriba-radius);

  /* Stage (SVG container) */
  --scriba-stage-padding:          1.5rem 1rem;
  --scriba-stage-bg:               var(--scriba-bg-code);

  /* Narration */
  --scriba-narration-font-size:    0.92rem;
  --scriba-narration-line-height:  1.55;
  --scriba-narration-padding:      0.75rem 1rem;

  /* Step label */
  --scriba-step-label-font:        600 0.72rem ui-monospace, "SF Mono", "Cascadia Mono", monospace;
  --scriba-step-label-color:       var(--scriba-fg-muted);

  /* Primitive geometry */
  --scriba-cell-size:              46px;
  --scriba-cell-rx:                5px;
  --scriba-cell-stroke-width:      1.5;
  --scriba-node-r:                 22px;
  --scriba-node-stroke-width:      2;
  --scriba-edge-stroke-width:      1.5;
  --scriba-tick-stroke-width:      1.5;
  --scriba-tick-length:            8px;

  /* Primitive typography */
  --scriba-cell-font:              700 14px inherit;
  --scriba-cell-index-font:        500 10px ui-monospace, monospace;
  --scriba-cell-index-color:       var(--scriba-fg-muted);
  --scriba-node-font:              700 14px inherit;
  --scriba-label-font:             600 11px ui-monospace, monospace;
  --scriba-label-color:            var(--scriba-fg-muted);

  /* Annotation */
  --scriba-annotation-font:        600 11px ui-monospace, monospace;
  --scriba-annotation-arrow-width: 1.6;

  /* Widget (interactive wrapper) */
  --scriba-widget-shadow:          0 1px 3px rgba(0,0,0,.05), 0 8px 24px rgba(0,0,0,.05);
  --scriba-widget-radius:          12px;
  --scriba-widget-focus-ring:      2px solid var(--scriba-link);

  /* Progress bar */
  --scriba-progress-height:        3px;
  --scriba-progress-bg:            var(--scriba-border);
  --scriba-progress-fill:          var(--scriba-link);
}

/* ============================================
   State color tokens (Wong CVD-safe palette)
   ============================================ */

:root {
  --scriba-state-idle-fill:        var(--scriba-bg-code);
  --scriba-state-idle-stroke:      var(--scriba-border);
  --scriba-state-idle-text:        var(--scriba-fg);

  --scriba-state-current-fill:     #0072B2;
  --scriba-state-current-stroke:   #0072B2;
  --scriba-state-current-text:     #ffffff;

  --scriba-state-done-fill:        #009E73;
  --scriba-state-done-stroke:      #009E73;
  --scriba-state-done-text:        #ffffff;

  --scriba-state-dim-fill:         color-mix(in oklch, var(--scriba-fg) 10%, transparent);
  --scriba-state-dim-stroke:       color-mix(in oklch, var(--scriba-fg) 20%, transparent);
  --scriba-state-dim-text:         var(--scriba-fg-muted);

  --scriba-state-error-fill:       #D55E00;
  --scriba-state-error-stroke:     #D55E00;
  --scriba-state-error-text:       #ffffff;

  --scriba-state-good-fill:        #009E73;
  --scriba-state-good-stroke:      #009E73;
  --scriba-state-good-text:        #ffffff;

  --scriba-state-highlight-fill:   #F0E442;
  --scriba-state-highlight-stroke: currentColor;
  --scriba-state-highlight-text:   var(--scriba-fg);

  /* Annotation color tokens */
  --scriba-annotation-info:        #0072B2;
  --scriba-annotation-warn:        #E69F00;
  --scriba-annotation-good:        #009E73;
  --scriba-annotation-error:       #D55E00;
  --scriba-annotation-muted:       var(--scriba-fg-muted);
}

/* ============================================
   State classes
   Applied to <g data-target="..."> elements.
   Only one scriba-state-* class per element.
   ============================================ */

/* -- idle (default) ---------------------------------------- */
.scriba-state-idle > rect,
.scriba-state-idle > circle {
  fill:         var(--scriba-state-idle-fill);
  stroke:       var(--scriba-state-idle-stroke);
  stroke-width: var(--scriba-cell-stroke-width);
}

.scriba-state-idle > line {
  stroke:       var(--scriba-state-idle-stroke);
  stroke-width: var(--scriba-edge-stroke-width);
}

.scriba-state-idle > text {
  fill: var(--scriba-state-idle-text);
}

/* -- current ----------------------------------------------- */
.scriba-state-current > rect,
.scriba-state-current > circle {
  fill:         var(--scriba-state-current-fill);
  stroke:       var(--scriba-state-current-stroke);
  stroke-width: calc(var(--scriba-cell-stroke-width) + 1);
}

.scriba-state-current > line {
  stroke:       var(--scriba-state-current-stroke);
  stroke-width: calc(var(--scriba-edge-stroke-width) + 1);
}

.scriba-state-current > text {
  fill: var(--scriba-state-current-text);
}

/* -- done -------------------------------------------------- */
.scriba-state-done > rect,
.scriba-state-done > circle {
  fill:         var(--scriba-state-done-fill);
  stroke:       var(--scriba-state-done-stroke);
  stroke-width: calc(var(--scriba-cell-stroke-width) + 0.5);
}

.scriba-state-done > line {
  stroke:       var(--scriba-state-done-stroke);
  stroke-width: calc(var(--scriba-edge-stroke-width) + 0.5);
}

.scriba-state-done > text {
  fill: var(--scriba-state-done-text);
}

/* -- dim --------------------------------------------------- */
.scriba-state-dim > rect,
.scriba-state-dim > circle {
  fill:   var(--scriba-state-dim-fill);
  stroke: var(--scriba-state-dim-stroke);
}

.scriba-state-dim > line {
  stroke: var(--scriba-state-dim-stroke);
}

.scriba-state-dim > text {
  fill: var(--scriba-state-dim-text);
}

.scriba-state-dim {
  opacity: 0.5;
  filter:  saturate(0.3);
}

/* -- error ------------------------------------------------- */
.scriba-state-error > rect,
.scriba-state-error > circle {
  fill:         var(--scriba-state-error-fill);
  stroke:       var(--scriba-state-error-stroke);
  stroke-width: calc(var(--scriba-cell-stroke-width) + 1);
}

.scriba-state-error > line {
  stroke:       var(--scriba-state-error-stroke);
  stroke-width: calc(var(--scriba-edge-stroke-width) + 1);
}

.scriba-state-error > text {
  fill: var(--scriba-state-error-text);
}

/* -- good -------------------------------------------------- */
.scriba-state-good > rect,
.scriba-state-good > circle {
  fill:         var(--scriba-state-good-fill);
  stroke:       var(--scriba-state-good-stroke);
  stroke-width: calc(var(--scriba-cell-stroke-width) + 0.5);
}

.scriba-state-good > line {
  stroke:       var(--scriba-state-good-stroke);
  stroke-width: calc(var(--scriba-edge-stroke-width) + 0.5);
}

.scriba-state-good > text {
  fill: var(--scriba-state-good-text);
}

/* -- highlight (ephemeral) --------------------------------- */
.scriba-state-highlight > rect,
.scriba-state-highlight > circle {
  fill:         var(--scriba-state-highlight-fill);
  stroke:       var(--scriba-state-highlight-stroke);
  stroke-width: 2px;
}

.scriba-state-highlight > line {
  stroke:       var(--scriba-state-highlight-stroke);
  stroke-width: 2px;
}

.scriba-state-highlight > text {
  fill: var(--scriba-state-highlight-text);
}

/* ============================================
   Primitive base styles
   ============================================ */

/* -- Cell (Array, Grid, DPTable) --------------------------- */
[data-primitive="array"] > [data-target] > rect,
[data-primitive="grid"] > [data-target] > rect,
[data-primitive="dptable"] > [data-target] > rect {
  fill:         var(--scriba-state-idle-fill);
  stroke:       var(--scriba-state-idle-stroke);
  stroke-width: var(--scriba-cell-stroke-width);
  rx:           var(--scriba-cell-rx);
}

[data-primitive="array"] > [data-target] > text,
[data-primitive="grid"] > [data-target] > text,
[data-primitive="dptable"] > [data-target] > text {
  font:              var(--scriba-cell-font);
  fill:              var(--scriba-fg);
  text-anchor:       middle;
  dominant-baseline: middle;
  pointer-events:    none;
}

/* -- Node (Graph, Tree) ------------------------------------ */
[data-primitive="graph"] .scriba-graph-nodes > [data-target] > circle,
[data-primitive="tree"] .scriba-tree-nodes > [data-target] > circle {
  fill:         var(--scriba-state-idle-fill);
  stroke:       var(--scriba-state-idle-stroke);
  stroke-width: var(--scriba-node-stroke-width);
}

[data-primitive="graph"] .scriba-graph-nodes > [data-target] > text,
[data-primitive="tree"] .scriba-tree-nodes > [data-target] > text {
  font:              var(--scriba-node-font);
  fill:              var(--scriba-fg);
  text-anchor:       middle;
  dominant-baseline: middle;
  pointer-events:    none;
}

/* -- Edge (Graph, Tree) ------------------------------------ */
[data-primitive="graph"] .scriba-graph-edges > [data-target] > line,
[data-primitive="tree"] .scriba-tree-edges > [data-target] > line {
  stroke:       var(--scriba-state-idle-stroke);
  stroke-width: var(--scriba-edge-stroke-width);
  fill:         none;
}

/* -- Tick mark (NumberLine) -------------------------------- */
[data-primitive="numberline"] > [data-target="nl.axis"] > line {
  stroke:       var(--scriba-fg);
  stroke-width: var(--scriba-edge-stroke-width);
}

[data-primitive="numberline"] > [data-target] > line {
  stroke:       var(--scriba-state-idle-stroke);
  stroke-width: var(--scriba-tick-stroke-width);
}

[data-primitive="numberline"] > [data-target] > text {
  font:              var(--scriba-cell-index-font);
  fill:              var(--scriba-fg);
  text-anchor:       middle;
  dominant-baseline: hanging;
}

/* -- Primitive labels -------------------------------------- */
[data-primitive] > .scriba-primitive-label {
  font:        var(--scriba-label-font);
  fill:        var(--scriba-label-color);
  text-anchor: start;
}

/* ============================================
   Annotation styles
   ============================================ */

.scriba-annotation {
  pointer-events: none;
}

.scriba-annotation > text {
  font:        var(--scriba-annotation-font);
  text-anchor: middle;
}

.scriba-annotation > path,
.scriba-annotation > line {
  fill:         none;
  stroke-width: var(--scriba-annotation-arrow-width);
  marker-end:   url(#scriba-annotation-arrowhead);
}

/* -- Annotation color tokens ------------------------------- */
.scriba-annotation-info > text  { fill: var(--scriba-annotation-info); }
.scriba-annotation-info > path,
.scriba-annotation-info > line  { stroke: var(--scriba-annotation-info); }

.scriba-annotation-warn > text  { fill: var(--scriba-annotation-warn); }
.scriba-annotation-warn > path,
.scriba-annotation-warn > line  { stroke: var(--scriba-annotation-warn); }

.scriba-annotation-good > text  { fill: var(--scriba-annotation-good); }
.scriba-annotation-good > path,
.scriba-annotation-good > line  { stroke: var(--scriba-annotation-good); }

.scriba-annotation-error > text { fill: var(--scriba-annotation-error); }
.scriba-annotation-error > path,
.scriba-annotation-error > line { stroke: var(--scriba-annotation-error); }

.scriba-annotation-muted > text { fill: var(--scriba-annotation-muted); }
.scriba-annotation-muted > path,
.scriba-annotation-muted > line { stroke: var(--scriba-annotation-muted); }

/* ============================================
   Dark mode
   ============================================ */

[data-theme="dark"] {
  /* Base token overrides for dark mode */
  --scriba-fg:                 #e6edf3;
  --scriba-fg-muted:           #7d8590;
  --scriba-bg:                 #0d1117;
  --scriba-bg-code:            #161b22;
  --scriba-border:             #30363d;
  --scriba-link:               #58a6ff;

  /* State overrides — only idle and dim change */
  --scriba-state-idle-fill:    var(--scriba-bg-code);
  --scriba-state-idle-stroke:  var(--scriba-border);
  --scriba-state-idle-text:    var(--scriba-fg);

  --scriba-state-dim-fill:     color-mix(in oklch, var(--scriba-fg) 10%, transparent);
  --scriba-state-dim-stroke:   color-mix(in oklch, var(--scriba-fg) 20%, transparent);
  --scriba-state-dim-text:     var(--scriba-fg-muted);

  --scriba-state-highlight-text: var(--scriba-fg);

  /* Layout surface overrides */
  --scriba-stage-bg:           var(--scriba-bg-code);

  /* Annotation muted adjusts to dark fg-muted */
  --scriba-annotation-muted:   var(--scriba-fg-muted);
}

/* ============================================
   Accessibility — reduced motion
   ============================================ */

@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    transition-duration: 0.01ms !important;
    animation-duration:  0.01ms !important;
  }
}

/* Scriba Animation — core styles
 * Pure CSS, zero JavaScript.
 */

/* ---------- \hl macro highlights ---------- */

/* When a filmstrip frame is targeted via URL fragment, highlight matching
   \hl spans inside the narration panel. */
.scriba-frame:target .scriba-hl {
  background-color: var(--scriba-state-highlight-fill, #F0E442);
  padding: 0.1em 0.2em;
  border-radius: 2px;
}

/* ---------- Keyframe animation utility classes ---------- */

.scriba-anim-rotate { animation: var(--scriba-anim-name) 2s linear infinite; }
.scriba-anim-pulse { animation: var(--scriba-anim-name) 1s ease-in-out infinite; }
.scriba-anim-orbit { animation: var(--scriba-anim-name) 3s linear infinite; }
.scriba-anim-fade-loop { animation: var(--scriba-anim-name) 2s ease-in-out infinite; }
.scriba-anim-trail { animation: var(--scriba-anim-name) 1.5s linear infinite; }

/* ---------- Reduced motion ---------- */

@media (prefers-reduced-motion: reduce) {
  .scriba-anim-rotate,
  .scriba-anim-pulse,
  .scriba-anim-orbit,
  .scriba-anim-fade-loop,
  .scriba-anim-trail {
    animation: none !important;
  }

  .scriba-frame:target .scriba-hl {
    /* Keep the highlight but skip any transition */
    transition: none !important;
  }
}

/* Scriba TeX Content Styles
 * Scoped under .scriba-tex-content
 * Uses --scriba-* CSS variables — see :root block below for defaults.
 * Dark mode via [data-theme="dark"] ancestor selector.
 */

/* ============================================
   Design tokens
   ============================================ */

:root {
  /* Text and background */
  --scriba-fg: #1f2328;
  --scriba-fg-muted: #656d76;
  --scriba-bg: #ffffff;
  --scriba-bg-code: #f6f8fa;
  --scriba-bg-inline-code: rgba(175, 184, 193, 0.2);

  /* Borders and lines */
  --scriba-border: #d0d7de;
  --scriba-border-strong: #8c959f;

  /* Links */
  --scriba-link: #0969da;
  --scriba-link-hover: #0550ae;

  /* Errors */
  --scriba-error: #cf222e;
  --scriba-error-bg: #ffebe9;

  /* Epigraph */
  --scriba-epigraph-border: #6b7280;

  /* Copy button */
  --scriba-copy-btn-bg: #f6f8fa;
  --scriba-copy-btn-fg: #1f2328;
  --scriba-copy-btn-bg-hover: #eaeef2;
  --scriba-copy-btn-fg-hover: #0969da;
  --scriba-copy-btn-bg-copied: #dafbe1;
  --scriba-copy-btn-fg-copied: #1a7f37;

  /* Diagram */
  --scriba-diagram-dim-opacity: 0.2;
  --scriba-diagram-transition: 220ms cubic-bezier(0.16, 1, 0.3, 1);
  --scriba-diagram-active-fill: #0969da;
  --scriba-diagram-active-stroke: #0969da;

  /* Geometry and typography */
  --scriba-radius: 6px;
  --scriba-code-font: ui-monospace, "SF Mono", "Cascadia Mono", "Roboto Mono", monospace;

  /* TeX size commands */
  --scriba-font-size-tiny: 0.625em;
  --scriba-font-size-scriptsize: 0.75em;
  --scriba-font-size-footnotesize: 0.85em;
  --scriba-font-size-small: 0.9em;
  --scriba-font-size-normalsize: 1em;
  --scriba-font-size-large: 1.2em;
  --scriba-font-size-Large: 1.4em;
  --scriba-font-size-LARGE: 1.6em;
  --scriba-font-size-huge: 1.9em;
  --scriba-font-size-Huge: 2.3em;
}

[data-theme="dark"] {
  --scriba-fg: #e6edf3;
  --scriba-fg-muted: #7d8590;
  --scriba-bg: #0d1117;
  --scriba-bg-code: #161b22;
  --scriba-bg-inline-code: rgba(110, 118, 129, 0.4);
  --scriba-border: #30363d;
  --scriba-border-strong: #6e7681;
  --scriba-link: #2f81f7;
  --scriba-link-hover: #58a6ff;
  --scriba-error: #ff7b72;
  --scriba-error-bg: rgba(248, 81, 73, 0.15);
  --scriba-epigraph-border: #8b949e;
  --scriba-copy-btn-bg: #21262d;
  --scriba-copy-btn-fg: #e6edf3;
  --scriba-copy-btn-bg-hover: #30363d;
  --scriba-copy-btn-fg-hover: #58a6ff;
  --scriba-copy-btn-bg-copied: rgba(46, 160, 67, 0.2);
  --scriba-copy-btn-fg-copied: #56d364;
  --scriba-diagram-active-fill: #58a6ff;
  --scriba-diagram-active-stroke: #58a6ff;
}

/* ============================================
   Typography — container
   ============================================ */

.scriba-tex-content {
  color: var(--scriba-fg);
  line-height: 1.65;
  max-width: 100%;
  overflow-wrap: break-word;
  word-wrap: break-word;
  font-size: inherit;
}

.scriba-tex-content strong,
.scriba-tex-content b {
  font-weight: 600;
}

.scriba-tex-content em,
.scriba-tex-content i {
  font-style: italic;
}

.scriba-tex-content .scriba-tex-smallcaps {
  font-variant-caps: small-caps;
}

.scriba-tex-content .scriba-tex-paragraph {
  margin: 0 0 0.75rem 0;
}

.scriba-tex-content .scriba-tex-paragraph:last-child {
  margin-bottom: 0;
}

/* ============================================
   Math (KaTeX)
   KaTeX owns .katex / .katex-display globally —
   these rules remain unscoped to avoid double-scoping issues.
   ============================================ */

.katex-display {
  overflow-x: auto;
  overflow-y: hidden;
  padding: 0.5rem 0;
  margin: 1rem 0;
}

.katex-display > .katex {
  max-width: 100%;
  overflow-x: auto;
  overflow-y: hidden;
  text-align: inherit;
}

.katex-display > .katex > .katex-html {
  white-space: normal;
}

.katex {
  font-size: 1em;
}

.katex-error {
  color: var(--scriba-error);
  background: var(--scriba-error-bg);
  padding: 0.125rem 0.25rem;
  border-radius: 2px;
}

[data-theme="dark"] .katex {
  color: var(--scriba-fg);
}

[data-theme="dark"] .katex .mord,
[data-theme="dark"] .katex .mop,
[data-theme="dark"] .katex .mrel,
[data-theme="dark"] .katex .mbin,
[data-theme="dark"] .katex .minner,
[data-theme="dark"] .katex .mpunct {
  color: inherit;
}

/* Scriba math wrappers */
.scriba-tex-content .scriba-tex-math-inline {
  display: inline;
}

.scriba-tex-content .scriba-tex-math-display,
.scriba-tex-content .scriba-tex-math-display .katex-display,
.scriba-tex-content .scriba-tex-math-display .katex {
  display: block;
  text-align: center;
}

.scriba-tex-content .scriba-tex-math-display {
  margin: 1rem 0;
}

.scriba-tex-content .scriba-tex-math-error {
  color: var(--scriba-error);
  background: var(--scriba-error-bg);
  padding: 0.125rem 0.25rem;
  border-radius: 2px;
  font-family: var(--scriba-code-font);
  font-size: 0.9em;
}

.scriba-tex-content .katex-fallback {
  color: var(--scriba-error);
  font-family: var(--scriba-code-font);
}

/* ============================================
   Headings
   ============================================ */

.scriba-tex-content .scriba-tex-heading {
  font-weight: 600;
  margin-top: 1.25rem;
  margin-bottom: 0.5rem;
  color: var(--scriba-fg);
  scroll-margin-top: 4.5rem;
}

.scriba-tex-content .scriba-tex-heading-2 {
  font-size: 1.25rem;
}

.scriba-tex-content .scriba-tex-heading-3 {
  font-size: 1.125rem;
}

.scriba-tex-content .scriba-tex-heading-4 {
  font-size: 1rem;
}

/* ============================================
   Lists
   ============================================ */

.scriba-tex-content .scriba-tex-list {
  padding-left: 1.25rem;
  margin: 0.5rem 0;
}

.scriba-tex-content .scriba-tex-list-unordered {
  list-style: disc;
}

.scriba-tex-content .scriba-tex-list-ordered {
  list-style: decimal;
}

.scriba-tex-content .scriba-tex-list-item {
  margin: 0.125rem 0;
}

/* ============================================
   Tables
   ============================================ */

.scriba-tex-content .scriba-tex-table {
  border-collapse: collapse;
  margin: 0.75rem 0;
  max-width: 100%;
}
