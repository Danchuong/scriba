<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scriba — Binary Search (Expected Output)</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  max-width: 720px;
  margin: 2rem auto;
  padding: 0 1rem;
  background: #fafafa;
  color: #212529;
}
h1 { font-size: 1.4rem; margin-bottom: 1.5rem; font-weight: 600; }

/* Widget container */
.scriba-widget {
  border: 1px solid #d0d7de;
  border-radius: 10px;
  background: #ffffff;
  overflow: hidden;
}

/* Controls bar */
.scriba-controls {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.6rem 1rem;
  background: #f6f8fa;
  border-bottom: 1px solid #d0d7de;
  user-select: none;
}
.scriba-controls button {
  background: #ffffff;
  border: 1px solid #d0d7de;
  border-radius: 6px;
  padding: 0.3rem 0.7rem;
  font-size: 0.8rem;
  cursor: pointer;
  color: #212529;
  transition: background 0.15s, border-color 0.15s;
}
.scriba-controls button:hover { background: #f0f0f0; border-color: #bbb; }
.scriba-controls button:active { background: #e4e4e4; }
.scriba-controls button:disabled { opacity: 0.35; cursor: default; }
.scriba-step-counter {
  font: 600 0.78rem ui-monospace, "SF Mono", monospace;
  color: #6c757d;
  min-width: 5rem;
  text-align: center;
}

/* Progress dots */
.scriba-progress {
  display: flex;
  gap: 4px;
  margin-left: auto;
}
.scriba-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #d0d7de;
  transition: background 0.2s;
}
.scriba-dot.active { background: #0072B2; }
.scriba-dot.done { background: #009E73; }

/* Stage */
.scriba-stage {
  padding: 1.25rem 1rem;
  display: flex;
  justify-content: center;
  min-height: 100px;
}
.scriba-stage-svg { width: 100%; height: auto; }

/* Narration */
.scriba-narration {
  padding: 0.75rem 1rem;
  font-size: 0.92rem;
  line-height: 1.55;
  color: #212529;
  border-top: 1px solid #f0f0f0;
  min-height: 2.5rem;
}

/* SVG text */
svg text {
  font: 700 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  text-anchor: middle;
  dominant-baseline: central;
}
.idx {
  font: 500 10px ui-monospace, monospace;
  fill: #6c757d;
}

/* Frame transition */
.scriba-stage svg, .scriba-narration {
  transition: opacity 0.2s ease;
}

/* Theme toggle */
.theme-toggle {
  position: fixed; top: 1rem; right: 1rem;
  padding: 0.35rem 0.7rem; cursor: pointer;
  border: 1px solid #ccc; border-radius: 6px; background: white;
  font-size: 0.8rem;
}

/* Dark mode */
[data-theme="dark"] body { background: #0d1117; color: #e6edf3; }
[data-theme="dark"] .scriba-widget { background: #161b22; border-color: #30363d; }
[data-theme="dark"] .scriba-controls { background: #1c2128; border-color: #30363d; }
[data-theme="dark"] .scriba-controls button { background: #21262d; border-color: #30363d; color: #e6edf3; }
[data-theme="dark"] .scriba-controls button:hover { background: #30363d; }
[data-theme="dark"] .scriba-step-counter { color: #7d8590; }
[data-theme="dark"] .scriba-narration { color: #e6edf3; border-color: #21262d; }
[data-theme="dark"] .scriba-dot { background: #30363d; }
[data-theme="dark"] .idx { fill: #7d8590; }
[data-theme="dark"] .theme-toggle { background: #21262d; color: #e6edf3; border-color: #30363d; }
</style>
</head>
<body>
<button class="theme-toggle" onclick="
  var t = document.documentElement.dataset.theme;
  document.documentElement.dataset.theme = t === 'dark' ? 'light' : 'dark';
">Toggle theme</button>

<h1>Binary Search — Expected Output</h1>

<div class="scriba-widget" id="widget">
  <!-- Controls -->
  <div class="scriba-controls">
    <button id="btn-prev" disabled>Prev</button>
    <span class="scriba-step-counter" id="counter">Step 1 / 2</span>
    <button id="btn-next">Next</button>
    <div class="scriba-progress">
      <div class="scriba-dot active" id="dot-0"></div>
      <div class="scriba-dot" id="dot-1"></div>
    </div>
  </div>

  <!-- Stage — frames swap here -->
  <div class="scriba-stage" id="stage"></div>

  <!-- Narration -->
  <p class="scriba-narration" id="narration"></p>
</div>

<!-- Frame data as hidden SVGs -->
<script>
const frames = [
  {
    narration: "Search for 7. Start with lo=0, hi=7, mid=3. Check a[mid].",
    svg: `<svg class="scriba-stage-svg" viewBox="0 0 500 72" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="2" width="56" height="36" rx="4" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
      <text x="30" y="20" fill="#212529">1</text><text class="idx" x="30" y="56">0</text>
      <rect x="64" y="2" width="56" height="36" rx="4" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
      <text x="92" y="20" fill="#212529">3</text><text class="idx" x="92" y="56">1</text>
      <rect x="126" y="2" width="56" height="36" rx="4" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
      <text x="154" y="20" fill="#212529">5</text><text class="idx" x="154" y="56">2</text>
      <rect x="188" y="2" width="56" height="36" rx="4" fill="#0072B2" stroke="#005a8e" stroke-width="2"/>
      <text x="216" y="20" fill="#fff">7</text><text class="idx" x="216" y="56">3</text>
      <rect x="250" y="2" width="56" height="36" rx="4" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
      <text x="278" y="20" fill="#212529">9</text><text class="idx" x="278" y="56">4</text>
      <rect x="312" y="2" width="56" height="36" rx="4" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
      <text x="340" y="20" fill="#212529">11</text><text class="idx" x="340" y="56">5</text>
      <rect x="374" y="2" width="56" height="36" rx="4" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
      <text x="402" y="20" fill="#212529">13</text><text class="idx" x="402" y="56">6</text>
      <rect x="436" y="2" width="56" height="36" rx="4" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
      <text x="464" y="20" fill="#212529">15</text><text class="idx" x="464" y="56">7</text>
    </svg>`
  },
  {
    narration: "a[3] = 7 — Found!",
    svg: `<svg class="scriba-stage-svg" viewBox="0 0 500 72" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="2" width="56" height="36" rx="4" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
      <text x="30" y="20" fill="#212529">1</text><text class="idx" x="30" y="56">0</text>
      <rect x="64" y="2" width="56" height="36" rx="4" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
      <text x="92" y="20" fill="#212529">3</text><text class="idx" x="92" y="56">1</text>
      <rect x="126" y="2" width="56" height="36" rx="4" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
      <text x="154" y="20" fill="#212529">5</text><text class="idx" x="154" y="56">2</text>
      <rect x="188" y="2" width="56" height="36" rx="4" fill="#009E73" stroke="#007a59" stroke-width="2"/>
      <text x="216" y="20" fill="#fff">7</text><text class="idx" x="216" y="56">3</text>
      <rect x="250" y="2" width="56" height="36" rx="4" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
      <text x="278" y="20" fill="#212529">9</text><text class="idx" x="278" y="56">4</text>
      <rect x="312" y="2" width="56" height="36" rx="4" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
      <text x="340" y="20" fill="#212529">11</text><text class="idx" x="340" y="56">5</text>
      <rect x="374" y="2" width="56" height="36" rx="4" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
      <text x="402" y="20" fill="#212529">13</text><text class="idx" x="402" y="56">6</text>
      <rect x="436" y="2" width="56" height="36" rx="4" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
      <text x="464" y="20" fill="#212529">15</text><text class="idx" x="464" y="56">7</text>
    </svg>`
  }
];

let current = 0;
const stage = document.getElementById('stage');
const narration = document.getElementById('narration');
const counter = document.getElementById('counter');
const btnPrev = document.getElementById('btn-prev');
const btnNext = document.getElementById('btn-next');
const dots = frames.map((_, i) => document.getElementById('dot-' + i));

function show(idx) {
  current = idx;
  stage.innerHTML = frames[idx].svg;
  narration.textContent = frames[idx].narration;
  counter.textContent = `Step ${idx + 1} / ${frames.length}`;
  btnPrev.disabled = idx === 0;
  btnNext.disabled = idx === frames.length - 1;
  dots.forEach((d, i) => {
    d.className = 'scriba-dot' + (i === idx ? ' active' : i < idx ? ' done' : '');
  });
}

btnPrev.addEventListener('click', () => { if (current > 0) show(current - 1); });
btnNext.addEventListener('click', () => { if (current < frames.length - 1) show(current + 1); });
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); if (current < frames.length - 1) show(current + 1); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); if (current > 0) show(current - 1); }
});

show(0);
</script>
</body>
</html>
